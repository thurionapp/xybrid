name: Build Flutter

on:
  pull_request:
    branches: [master]
    paths:
      - 'bindings/flutter/**'
      - 'crates/xybrid-ffi-facade/**'
      - 'xtask/**'
      - '.github/workflows/build-flutter.yml'
      # Docs-only changes under the paths above (READMEs, examples) never
      # affect the native build — exclude markdown so they don't trigger it.
      - '!**.md'
  # Run on master merges too, so each merge saves a default-branch-scoped
  # cache (sccache + rust-cache). GitHub Actions caches are branch-scoped:
  # a PR run can only restore caches from its own branch or the default
  # branch. Without this trigger master never builds, so master has no
  # cache, so every new PR branch's first run is cold. Warming master here
  # lets new branches start warm. Keep these paths in sync with the
  # pull_request trigger above.
  push:
    branches: [master]
    paths:
      - 'bindings/flutter/**'
      - 'crates/xybrid-ffi-facade/**'
      - 'xtask/**'
      - '.github/workflows/build-flutter.yml'
      - '!**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FLUTTER_VERSION: "3.35.7"
  FRB_VERSION: "2.11.1"

jobs:
  # Linux-only on push/PR. macOS + Windows Flutter binaries are built and
  # validated in release.yml (precompile-flutter-* jobs) at release time.
  # Use workflow_dispatch + test-ci.yml for ad-hoc per-platform validation.
  build-flutter:
    name: Build Flutter (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            rust_targets: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust_targets }}

      # sccache: caches individual compiler outputs (Rust + C/C++)
      # Uses GitHub Actions cache as backend (no external service needed)
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "flutter-${{ matrix.platform }}"
          cache-all-crates: "true"
          save-if: "true"

      # Flutter SDK caching via subosito/flutter-action
      # Expected cache hit rate: ~99% (Flutter version changes rarely)
      # Cache includes: Flutter SDK (~1GB), pub cache
      - name: Install Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install LLVM (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Install LLVM (macOS)
        if: matrix.platform == 'macos'
        run: brew install llvm

      - name: Install LLVM and NASM (Windows)
        if: matrix.platform == 'windows'
        run: choco install llvm nasm

      - name: Add NASM to PATH (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: echo "C:\\Program Files\\NASM" >> $GITHUB_PATH

      # Cache the FRB codegen binary to avoid compiling from source every run
      - name: Cache FRB codegen binary
        id: cache-frb
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/flutter_rust_bridge_codegen
            ~/.cargo/bin/flutter_rust_bridge_codegen.exe
          key: frb-codegen-${{ runner.os }}-${{ env.FRB_VERSION }}

      - name: Install flutter_rust_bridge_codegen
        if: steps.cache-frb.outputs.cache-hit != 'true'
        run: cargo install flutter_rust_bridge_codegen@${{ env.FRB_VERSION }}

      - name: Force dynamic CRT on Windows (required for cdylib DLL linking)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          # Use -MD not /MD — Git Bash mangles /MD to C:/Program Files/Git/MD
          echo "CFLAGS=-MD" >> $GITHUB_ENV
          echo "CXXFLAGS=-MD" >> $GITHUB_ENV

      - name: Run FRB codegen
        working-directory: bindings/flutter
        run: flutter_rust_bridge_codegen generate

      - name: Check FRB bindings are up-to-date
        shell: bash
        run: |
          if ! git diff --exit-code bindings/flutter/lib/src/rust/; then
            echo ""
            echo "ERROR: Flutter Rust Bridge bindings are out of date."
            echo "A Rust API change was committed without regenerating Dart bindings."
            echo ""
            echo "Fix: run 'flutter_rust_bridge_codegen generate' in bindings/flutter/ and commit the result."
            exit 1
          fi
          echo "FRB bindings are up-to-date."

      # Prebuilt-natives fast path (Linux x86_64). Best-effort: pull the prebuilt
      # llama.cpp slice and point build.rs at it so the Linux Flutter build skips
      # the llama.cpp cmake compile. On ANY miss/error this is a silent no-op
      # (continue-on-error) and it compiles from source — it can never break the
      # build. Only the linux leg pulls (the only published non-android slice a
      # Flutter build consumes today; macOS/Windows legs build at release time).
      - name: Setup oras
        if: matrix.platform == 'linux'
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
      # `oras login` (not docker/login-action) for cross-platform consistency.
      # Best-effort + same-repo only (forks have no token → anonymous pull).
      - name: Log in to ghcr (best-effort, same-repo)
        if: matrix.platform == 'linux' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Pull prebuilt natives (linux x86_64, best-effort)
        if: matrix.platform == 'linux'
        continue-on-error: true
        env:
          XYBRID_NATIVES_PKG: ghcr.io/xybrid-ai/llama-natives
        run: |
          DEST="$RUNNER_TEMP/natives"
          if tools/scripts/natives-pull.sh x86_64-unknown-linux-gnu base "$DEST"; then
            echo "XYBRID_NATIVES_PREBUILT_DIR=$DEST" >> "$GITHUB_ENV"
            echo "prebuilt natives staged at $DEST (linux will skip cmake)"
          else
            echo "no prebuilt natives — compiles from source (unchanged)"
          fi

      - name: Build Flutter native library
        run: cargo xtask build-flutter --platform ${{ matrix.platform }} --release --skip-frb-codegen

      - name: Verify build output (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "Build output for ${{ matrix.platform }}:"
          find bindings/flutter/rust/target -name "libxybrid_flutter_ffi*" -type f 2>/dev/null || \
          find target -name "libxybrid_flutter_ffi*" -type f 2>/dev/null || \
          echo "Note: Library may have been built to different location"

      - name: Verify build output (Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Output "Build output for ${{ matrix.platform }}:"
          Get-ChildItem -Path . -Recurse -Filter "xybrid_flutter_ffi*" -ErrorAction SilentlyContinue | Select-Object FullName

      - name: Upload Flutter native library artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: flutter-native-${{ matrix.platform }}
          path: |
            bindings/flutter/rust/target/**/release/*xybrid_flutter_ffi*
            target/**/release/*xybrid_flutter_ffi*
          if-no-files-found: error
