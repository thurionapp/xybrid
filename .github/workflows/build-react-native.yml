name: Build React Native

on:
  pull_request:
    branches: [master]
    paths:
      - 'bindings/react-native/**'
      - 'bindings/apple/**'
      - 'bindings/kotlin/**'
      - 'crates/xybrid-bolt/**'
      - 'crates/xybrid-ffi-facade/**'
      - 'xtask/**'
      - '.github/workflows/build-react-native.yml'
  # Run on master merges too, so each merge saves a default-branch-scoped
  # cache (sccache + rust-cache). GitHub Actions caches are branch-scoped:
  # a PR run can only restore caches from its own branch or the default
  # branch. Without this trigger master never builds, so master has no
  # cache, so every new PR branch's first run is cold. Warming master here
  # lets new branches start warm. Keep these paths in sync with the
  # pull_request trigger above.
  push:
    branches: [master]
    paths:
      - 'bindings/react-native/**'
      - 'bindings/apple/**'
      - 'bindings/kotlin/**'
      - 'crates/xybrid-bolt/**'
      - 'crates/xybrid-ffi-facade/**'
      - 'xtask/**'
      - '.github/workflows/build-react-native.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Only iOS needs per-package native staging: the pod vendors the bolt
  # XCFramework + Swift wrapper sources. Android pulls its natives + Kotlin
  # binding from the `ai.xybrid:xybrid-kotlin` Maven AAR (declared in
  # android/build.gradle), so there is nothing to stage or cross-build here.

  stage-ios:
    name: Stage iOS artifacts
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          # The GHA-backed sccache server occasionally needs more than the
          # default 10s to complete its first handshake with the cache
          # service, which surfaces as "Timed out waiting for server startup"
          # and aborts the build. There is no env var for this, so write a
          # minimal config file (it coexists with the env-based GHA settings
          # above) bumping the startup timeout. https://github.com/mozilla/sccache
          SCCACHE_CONF="$RUNNER_TEMP/sccache-config.toml"
          echo "server_startup_timeout_ms = 60000" > "$SCCACHE_CONF"
          echo "SCCACHE_CONF=$SCCACHE_CONF" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "rn-ios"
          cache-all-crates: "true"
          save-if: "true"

      # boltffi CLI provides the `boltffi pack apple` that build-xcframework
      # (invoked by stage-react-native) shells out to. Pinned to 0.25.3 to
      # match the runtime `boltffi` crate (see build-apple.yml for why the
      # CLI/runtime versions must match).
      - name: Cache boltffi CLI
        id: cache-boltffi
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/boltffi
          key: boltffi-cli-${{ runner.os }}-0.25.3

      - name: Install boltffi CLI
        run: which boltffi || cargo install boltffi_cli --version 0.25.3 --locked

      # Prebuilt-natives fast path (iOS device + arm64 simulator). stage-ios
      # routes through the same `boltffi pack apple` as build-apple, so it
      # consumes the identical two slices. Best-effort: a miss/error is a silent
      # no-op (continue-on-error) and the slice compiles from source — it can
      # never break the build.
      - name: Setup oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
      # `oras login`, not docker/login-action: macOS runners have no docker.
      # Best-effort + same-repo only (forks have no token → anonymous pull).
      - name: Log in to ghcr (best-effort, same-repo)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Pull prebuilt natives (iOS device + sim, best-effort)
        continue-on-error: true
        env:
          XYBRID_NATIVES_PKG: ghcr.io/xybrid-ai/llama-natives
        run: |
          DEST="$RUNNER_TEMP/natives"
          got_any=0
          for triple in aarch64-apple-ios aarch64-apple-ios-sim; do
            if tools/scripts/natives-pull.sh "$triple" base "$DEST"; then
              echo "prebuilt natives staged for $triple (will skip cmake)"
              got_any=1
            else
              echo "no prebuilt natives for $triple — compiles from source"
            fi
          done
          if [ "$got_any" = 1 ]; then
            echo "XYBRID_NATIVES_PREBUILT_DIR=$DEST" >> "$GITHUB_ENV"
          else
            echo "no prebuilt natives — compiles from source (unchanged)"
          fi

      - name: Stage iOS artifacts
        run: cargo xtask stage-react-native --release

      - name: Verify iOS staging
        run: |
          set -euo pipefail
          XCFW="bindings/react-native/ios/Frameworks/XybridFFI.xcframework"
          [ -d "$XCFW" ] || { echo "Missing $XCFW"; exit 1; }
          for f in Xybrid.swift xybrid_bolt.swift; do
            [ -f "bindings/react-native/ios/XybridSwift/$f" ] \
              || { echo "Missing bindings/react-native/ios/XybridSwift/$f"; exit 1; }
          done
          echo "iOS staging looks good:"
          ls -la "$XCFW"
          ls -la bindings/react-native/ios/XybridSwift/

      - name: Upload iOS staged artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rn-ios-staged
          path: |
            bindings/react-native/ios/Frameworks/
            bindings/react-native/ios/XybridSwift/
          if-no-files-found: error

  package:
    name: Typecheck + npm pack
    needs: stage-ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'

      - name: Download iOS staged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rn-ios-staged
          path: bindings/react-native/ios/

      - name: Install RN module deps
        working-directory: bindings/react-native
        run: npm install --no-audit --no-fund

      - name: Typecheck
        working-directory: bindings/react-native
        run: npm run typecheck

      - name: Build TS
        working-directory: bindings/react-native
        run: npm run build

      - name: npm pack (dry-run)
        working-directory: bindings/react-native
        run: npm pack --dry-run

      - name: npm pack (real)
        working-directory: bindings/react-native
        run: npm pack

      - name: Upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: react-native-xybrid-tarball
          path: bindings/react-native/react-native-xybrid-*.tgz
          if-no-files-found: error

  smoke-ios:
    name: Smoke build (iOS podspec lint)
    needs: stage-ios
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download iOS staged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: rn-ios-staged
          path: bindings/react-native/ios/

      # `--quick` validates the podspec's syntax, file paths, and dependency
      # graph — which is what this gate is for. A full lint runs xcodebuild
      # against the spec in isolation, which fails for a RN TurboModule
      # because the spec depends on React Native's codegen output and headers
      # (e.g. `<React/RCTBridgeModule.h>`) that `pod lib lint` can't resolve
      # without a host app's `use_react_native!` setup. Replace with a real
      # `pod install` against an example app when one is added.
      - name: Lint podspec
        working-directory: bindings/react-native
        run: |
          pod lib lint react-native-xybrid.podspec \
            --allow-warnings \
            --quick \
            --verbose

  # The real end-to-end gate: build the Expo example app for Android from
  # working-tree source. This compiles the bolt .so, publishes the kotlin
  # binding to mavenLocal, runs RN codegen, and assembles the APK — the path
  # that would have caught every defect that previously slipped through
  # (non-exhaustive when, missing codegen wiring, version skew, .so strip).
  # It does NOT run inference (no emulator); assembleDebug proves the whole
  # build + link + autolink chain. Mirrors the documented local dev flow.
  build-android-example:
    name: Build Android example (from source)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Keep LLVM (large-packages: false): the bolt build runs bindgen for
      # the llama/ggml C++ via libclang. Removing system LLVM breaks it with
      # "'stdbool.h' file not found".
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Use Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "rn-android-example"
          cache-all-crates: "true"
          save-if: "true"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install NDK
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Set NDK environment
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV

      # build-android-bolt.sh adds the libc++_shared DT_NEEDED via patchelf,
      # which isn't preinstalled on the runner.
      - name: Install patchelf + cargo-ndk
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          which cargo-ndk || cargo install cargo-ndk

      - name: Install boltffi CLI
        run: which boltffi || cargo install boltffi_cli --version 0.25.3 --locked

      # Prebuilt-natives fast path (mirrors build-android.yml). Best-effort:
      # pull the prebuilt llama.cpp slice per ABI from ghcr so each ABI skips
      # the ~25-min cmake compile. ANY miss/error is a silent no-op
      # (continue-on-error) → that ABI compiles from source, never breaks the
      # build. build.rs keys on XYBRID_NATIVES_PREBUILT_DIR/<target>.
      - name: Setup oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
      - name: Log in to ghcr (best-effort, same-repo)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull prebuilt natives (all shipped ABIs, best-effort)
        continue-on-error: true
        env:
          XYBRID_NATIVES_PKG: ghcr.io/xybrid-ai/llama-natives
        run: |
          DEST="$RUNNER_TEMP/natives"
          got_any=0
          for triple in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android; do
            if tools/scripts/natives-pull.sh "$triple" base "$DEST"; then
              echo "prebuilt natives staged for $triple (will skip cmake)"
              got_any=1
            else
              echo "no prebuilt natives for $triple — compiles from source"
            fi
          done
          if [ "$got_any" = 1 ]; then
            echo "XYBRID_NATIVES_PREBUILT_DIR=$DEST" >> "$GITHUB_ENV"
          else
            echo "no prebuilt natives for any ABI — all compile from source (unchanged)"
          fi

      # 1. Build the bolt .so for all ABIs (staged into bindings/kotlin/libs).
      - name: Build Android native libs
        run: cargo xtask build-android --release

      # 2. Publish the kotlin binding from source to mavenLocal (no signing —
      #    guarded on signingInMemoryKey, absent here).
      - name: Publish xybrid-kotlin to mavenLocal
        working-directory: bindings/kotlin
        run: ./gradlew publishToMavenLocal --no-daemon

      # 3. Build the example app: install JS deps, prebuild (codegen +
      #    config plugin → mavenLocal + keepDebugSymbols), assemble the APK.
      - name: Install example deps
        working-directory: bindings/react-native/example
        run: npm install --no-audit --no-fund

      - name: Expo prebuild (android)
        working-directory: bindings/react-native/example
        run: CI=1 npx expo prebuild --platform android --no-install

      - name: Assemble debug APK
        working-directory: bindings/react-native/example/android
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload example APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: xybrid-example-android-debug
          path: bindings/react-native/example/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
