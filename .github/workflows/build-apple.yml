name: Build Apple

on:
  pull_request:
    branches: [master]
    paths:
      - 'bindings/apple/**'
      - 'crates/xybrid-uniffi/**'
      - 'xtask/**'
      - '.github/workflows/build-apple.yml'
      # Docs-only changes under the paths above (READMEs, examples) never
      # affect the native build — exclude markdown so they don't trigger it.
      - '!**.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-xcframework:
    name: Build XCFramework
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "apple-xcframework"
          cache-all-crates: "true"
          save-if: "true"

      - name: Build XCFramework
        run: cargo xtask build-xcframework --release

      - name: Verify XCFramework
        run: |
          XCFW_PATH="bindings/apple/XCFrameworks/XybridFFI.xcframework"
          if [ ! -d "$XCFW_PATH" ]; then
            echo "Error: XCFramework not found at $XCFW_PATH"
            exit 1
          fi
          echo "XCFramework contents:"
          ls -la "$XCFW_PATH"
          echo ""
          echo "Verifying architectures..."
          # Check iOS device library
          file "$XCFW_PATH/ios-arm64/libxybrid_uniffi.a" || true
          # Check iOS simulator library (arm64)
          file "$XCFW_PATH/ios-arm64-simulator/libxybrid_uniffi.a" || true
          # Check macOS library (arm64)
          file "$XCFW_PATH/macos-arm64/libxybrid_uniffi.a" || true

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: XybridFFI-xcframework
          path: bindings/apple/XCFrameworks/XybridFFI.xcframework
          if-no-files-found: error
