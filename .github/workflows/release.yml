name: Release (legacy tag-driven)

# Break-glass for the old tag-driven release flow. The push: tags trigger
# was removed in PR #170 because the new release-branch flow
# (release-prep.yml + release-publish.yml) creates the v<version> tag via
# the Releases API as part of publishing — leaving this workflow armed on
# tag pushes would double-fire it against every new-flow release.
#
# To run this workflow manually (e.g. if the new flow breaks and you need
# to ship from a tag): Actions -> Release (legacy tag-driven) -> Run
# workflow -> choose the v<version> tag in the "Use workflow from" picker.
# Every step below reads GITHUB_REF so the tag must already exist before
# dispatching.
#
# Planned for deletion once one or two releases have shipped cleanly
# through the new flow.

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # NDK version - r26b is stable and widely supported
  NDK_VERSION: "26.1.10909125"
  FLUTTER_VERSION: "3.35.7"
  FRB_VERSION: "2.11.1"

permissions: read-all

jobs:
  #
  # Version check - verify all package versions match the git tag
  #
  check-version:
    name: Verify Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check versions match git tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Git tag version: $TAG_VERSION"

          # Check Cargo workspace
          CARGO_VERSION=$(grep -A5 '\[workspace\.package\]' Cargo.toml | grep '^version' | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "Cargo workspace:  $CARGO_VERSION"

          # Check Flutter
          FLUTTER_VERSION_PKG=$(grep '^version:' bindings/flutter/pubspec.yaml | sed 's/version: *//')
          echo "Flutter pubspec:  $FLUTTER_VERSION_PKG"

          # Check Unity
          UNITY_VERSION=$(python3 -c "import json; print(json.load(open('bindings/unity/package.json'))['version'])")
          echo "Unity package:    $UNITY_VERSION"

          # Check Kotlin
          KOTLIN_VERSION=$(grep '^version = ' bindings/kotlin/build.gradle.kts | sed 's/version = "\(.*\)"/\1/')
          echo "Kotlin gradle:    $KOTLIN_VERSION"

          # Check Swift (root Package.swift sdkVersion drives the SPM
          # release-asset URL and must match the tag).
          SWIFT_VERSION=$(grep '^let sdkVersion = ' Package.swift | sed 's/let sdkVersion = "\(.*\)"/\1/')
          echo "Swift Package:    $SWIFT_VERSION"

          # Verify all match
          FAILED=0
          for V in "$CARGO_VERSION" "$FLUTTER_VERSION_PKG" "$UNITY_VERSION" "$KOTLIN_VERSION" "$SWIFT_VERSION"; do
            if [ "$V" != "$TAG_VERSION" ]; then
              echo ""
              echo "ERROR: Version mismatch! Tag is v$TAG_VERSION but found $V"
              echo "Run 'just bump-version $TAG_VERSION' and commit before tagging."
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo ""
          echo "All versions match v$TAG_VERSION"

  #
  # Publish Rust crates to crates.io
  #
  # Independent of the native-artifact build jobs — only needs source. Runs in
  # parallel with build-apple-all / build-android / build-cli. Idempotent: a
  # tag re-run skips crates whose <name>@<version> is already on crates.io.
  #
  # Dependency order is macros -> core -> sdk -> xybrid. Each publish waits for
  # the new version to become visible on the crates.io index before moving on,
  # since the next crate's `cargo publish` resolves the prior one from the
  # registry.
  #
  publish-crates:
    name: Publish to crates.io
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "publish-crates"
          save-if: "true"

      - name: Publish crates in dependency order
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Publishing version: $TAG_VERSION"

          # Skip if <crate>@<version> is already on crates.io. Treat anything
          # other than HTTP 200 as "not published yet" so transient 5xx errors
          # don't silently skip a real publish.
          already_published() {
            local crate=$1
            local status
            status=$(curl -fsS -o /dev/null -w "%{http_code}" \
              -A "xybrid-release-workflow/1.0 (+https://github.com/${{ github.repository }})" \
              "https://crates.io/api/v1/crates/${crate}/${TAG_VERSION}" || echo "000")
            [ "$status" = "200" ]
          }

          # Poll the index until the just-published version is visible. The
          # follow-up `cargo publish` for a downstream crate resolves from the
          # sparse index, so we need this to succeed before continuing.
          wait_for_index() {
            local crate=$1
            for i in $(seq 1 60); do
              if already_published "$crate"; then
                echo "${crate}@${TAG_VERSION} visible on crates.io after ${i} polls."
                return 0
              fi
              sleep 5
            done
            echo "::error::${crate}@${TAG_VERSION} did not appear on crates.io after 5 minutes"
            return 1
          }

          publish_crate() {
            local crate=$1
            if already_published "$crate"; then
              echo "::notice::${crate}@${TAG_VERSION} already published — skipping."
              return 0
            fi
            echo "Publishing ${crate}@${TAG_VERSION}..."
            cargo publish -p "$crate"
            wait_for_index "$crate"
          }

          publish_crate xybrid-macros
          publish_crate xybrid-core
          publish_crate xybrid-sdk
          publish_crate xybrid

  #
  # Consolidated Apple build: XCFramework + Flutter darwin precompile + CLI macos-arm64
  # Runs all three on one macos-14 runner to share sccache and avoid 3x queue wait.
  #
  build-apple-all:
    name: Build Apple (all)
    permissions:
      contents: write   # pins the XybridFFI checksum and force-pushes the tag
    needs: [check-version]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "apple-xcframework"
          cache-all-crates: "true"
          save-if: "true"

      - name: Install LLVM
        run: brew install llvm

      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1

      # --- Step 1: Build XCFramework (cold compile, ~18 min) ---
      - name: Build XCFramework
        run: cargo xtask build-xcframework --release

      - name: Prepare XCFramework artifact
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          cd bindings/apple/XCFrameworks
          zip -r ../../../dist/XybridFFI-${VERSION}.xcframework.zip XybridFFI.xcframework

      - name: Compute XCFramework checksum
        id: checksum
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          CHECKSUM=$(shasum -a 256 dist/XybridFFI-${VERSION}.xcframework.zip | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "XCFramework SHA256: $CHECKSUM"

      - name: Patch Package.swift checksum and force-move tag
        # SPM reads Package.swift at the tagged commit and refuses the package
        # if xybridFFIChecksum doesn't match the downloaded zip's SHA. The
        # xcframework build is non-deterministic between runs (zip mtimes,
        # Rust codegen ordering), so we can't pre-bake a stable checksum at
        # tag time. Instead: compute the SHA of the zip we just built, patch
        # the manifest, commit, and force-move the tag to that commit. SPM
        # consumers resolving v<version> see a manifest whose checksum
        # matches the released zip.
        #
        # Pushes authored by GITHUB_TOKEN do not re-trigger workflow runs
        # (https://docs.github.com/en/actions/security-guides/automatic-token-authentication),
        # so the tag force-push does not loop the Release workflow.
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/}

          ./bindings/apple/scripts/sync-spm-checksum.sh "dist/XybridFFI-${VERSION}.xcframework.zip"

          if git diff --quiet Package.swift; then
            echo "Package.swift checksum already matches the built zip — nothing to do."
            exit 0
          fi

          echo "Package.swift checksum patched:"
          git diff Package.swift

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Package.swift
          git commit -m "chore(release): pin XybridFFI checksum for ${VERSION}"

          NEW_COMMIT=$(git rev-parse HEAD)
          echo "::notice::Tag ${VERSION} now points at ${NEW_COMMIT} with the released zip's xybridFFIChecksum baked in"

          git tag -f "${VERSION}" "${NEW_COMMIT}"
          git push --force origin "refs/tags/${VERSION}"

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: xcframework
          path: dist/XybridFFI-*.xcframework.zip
          if-no-files-found: error

      # --- Step 2: Precompile Flutter darwin (sccache warm, ~3-5 min) ---
      - name: Install build tool dependencies
        working-directory: bindings/flutter/cargokit/build_tool
        run: dart pub get

      - name: Precompile and upload Flutter darwin binaries
        working-directory: bindings/flutter/cargokit/build_tool
        shell: bash
        env:
          PRIVATE_KEY: ${{ secrets.CARGOKIT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dart run bin/build_tool.dart precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir ${{ github.workspace }}/bindings/flutter/rust \
            --verbose

      # --- Step 3: Build CLI macos-arm64 (sccache warm, ~1-2 min) ---
      - name: Build CLI (macos-arm64)
        run: cargo build --release -p xybrid-cli --target aarch64-apple-darwin --features platform-macos

      - name: Strip CLI binary
        run: strip target/aarch64-apple-darwin/release/xybrid

      - name: Prepare CLI artifact
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist-cli
          cp target/aarch64-apple-darwin/release/xybrid dist-cli/xybrid-${VERSION}-macos-arm64
          chmod +x dist-cli/xybrid-${VERSION}-macos-arm64

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-macos-arm64
          path: dist-cli/*

  #
  # Android .so files build (Linux with NDK)
  #
  build-android:
    name: Build Android
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "android-ndk"
          cache-all-crates: "true"
          save-if: "true"

      - name: Setup Android NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: which cargo-ndk || cargo install cargo-ndk

      - name: Build Android .so files
        run: cargo xtask build-android --release

      - name: Prepare artifact with version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          cd bindings/kotlin/libs
          zip -r ../../../dist/xybrid-android-${VERSION}.zip .

      - name: Upload Android artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-libs
          path: dist/xybrid-android-*.zip
          if-no-files-found: error

  #
  # Publish Kotlin SDK to Maven Central
  #
  publish-kotlin:
    name: Publish Kotlin SDK
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Download Android .so artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: android-libs
          path: artifacts

      - name: Extract .so files into Kotlin libs/
        run: |
          mkdir -p bindings/kotlin/libs
          cd bindings/kotlin/libs
          unzip -o ${{ github.workspace }}/artifacts/xybrid-android-*.zip

      - name: Publish to Maven Central
        working-directory: bindings/kotlin
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

  #
  # Flutter precompiled binaries — Linux (waits for build-android to warm sccache)
  #
  precompile-flutter-linux:
    name: Precompile Flutter (linux)
    permissions:
      contents: write   # cargokit precompile-binaries uploads release assets
    needs: [check-version, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            x86_64-unknown-linux-gnu,
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "flutter-linux"
          cache-all-crates: "true"
          save-if: "true"

      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1

      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: which cargo-ndk || cargo install cargo-ndk

      - name: Install build tool dependencies
        working-directory: bindings/flutter/cargokit/build_tool
        run: dart pub get

      - name: Precompile and upload binaries
        working-directory: bindings/flutter/cargokit/build_tool
        shell: bash
        env:
          PRIVATE_KEY: ${{ secrets.CARGOKIT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dart run bin/build_tool.dart precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir ${{ github.workspace }}/bindings/flutter/rust \
            --verbose \
            --android-sdk-location $ANDROID_HOME \
            --android-ndk-version ${{ env.NDK_VERSION }} \
            --android-min-sdk-version 28

  #
  # Flutter precompiled binaries — Windows
  #
  precompile-flutter-windows:
    name: Precompile Flutter (windows)
    permissions:
      contents: write   # cargokit precompile-binaries uploads release assets
    needs: [check-version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "flutter-windows"
          cache-all-crates: "true"
          save-if: "true"

      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1

      - name: Install LLVM and NASM
        run: choco install llvm nasm

      - name: Add NASM to PATH
        shell: bash
        run: echo "C:\\Program Files\\NASM" >> $GITHUB_PATH

      - name: Install build tool dependencies
        working-directory: bindings/flutter/cargokit/build_tool
        run: dart pub get

      - name: Force dynamic CRT (required for cdylib DLL linking)
        shell: bash
        run: |
          echo "CFLAGS=-MD" >> $GITHUB_ENV
          echo "CXXFLAGS=-MD" >> $GITHUB_ENV

      - name: Precompile and upload binaries
        working-directory: bindings/flutter/cargokit/build_tool
        shell: bash
        env:
          PRIVATE_KEY: ${{ secrets.CARGOKIT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Convert Windows backslashes to forward slashes so bash doesn't
          # interpret \a, \x etc. as backslash-escapes and mangle the path.
          MANIFEST_DIR="${GITHUB_WORKSPACE//\\//}/bindings/flutter/rust"
          dart run bin/build_tool.dart precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir "$MANIFEST_DIR" \
            --verbose

  #
  # Publish Flutter SDK to pub.dev (OIDC -- zero secrets)
  #
  # Inlines the same steps the dart-lang/setup-dart publish.yml reusable
  # workflow runs, but pins actions/checkout to v4 instead of v6. v6 added
  # a safety check that aborts when the workflow's ref has been updated
  # since the run was triggered. Our build-apple-all job force-moves the
  # tag (self-patches xybridFFIChecksum into Package.swift), which trips
  # that check and skipped Flutter from pub.dev on 0.1.0-rc2. v4 doesn't
  # enforce the check; everything else under release.yml already pins v4.
  #
  # pub.dev's trusted-publisher config matches on `workflow_ref` (the
  # caller's workflow path), so inlining preserves the existing trust
  # binding to xybrid-ai/xybrid/.github/workflows/release.yml.
  #
  # This job does NOT block the GitHub Release -- failure only affects
  # pub.dev publishing.
  #
  publish-flutter:
    name: Publish Flutter to pub.dev
    needs: [build-apple-all, precompile-flutter-linux, precompile-flutter-windows]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC authentication with pub.dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260
      - uses: flutter-actions/setup-flutter@18c66a64fb6f6d3338c63cabbc5cd6da395e7f1d
      - name: Install dependencies
        run: dart pub get
        working-directory: bindings/flutter
      - name: Publish - dry run
        run: dart pub publish --dry-run
        working-directory: bindings/flutter
      - name: Publish to pub.dev
        run: dart pub publish -f
        working-directory: bindings/flutter

  #
  # CLI builds (Linux + Windows only; macOS is built in build-apple-all)
  #
  build-cli:
    name: Build CLI (${{ matrix.name }})
    needs: [check-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: xybrid
            features: platform-desktop

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: xybrid.exe
            features: platform-desktop

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "cli-${{ matrix.name }}"
          cache-all-crates: "true"
          save-if: "true"

      - name: Build CLI
        run: cargo build --release -p xybrid-cli --target ${{ matrix.target }} --features ${{ matrix.features }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Prepare artifact
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/xybrid-${VERSION}-${{ matrix.name }}.exe
          else
            cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/xybrid-${VERSION}-${{ matrix.name }}
            chmod +x dist/xybrid-${VERSION}-${{ matrix.name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.name }}
          path: dist/*

  #
  # Create GitHub Release after all builds complete
  #
  release:
    name: Create Release
    permissions:
      contents: write   # creates the GitHub release (softprops/action-gh-release)
    runs-on: ubuntu-latest
    needs: [build-apple-all, build-android, build-cli]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List all artifacts
        run: |
          echo "All release artifacts:"
          find artifacts -type f | sort

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "## What's Changed" > CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md

          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" >> CHANGELOG_RELEASE.md
          else
            git log --pretty=format:"- %s" -n 20 >> CHANGELOG_RELEASE.md
          fi

          echo "" >> CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md
          echo "### Artifacts" >> CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md
          echo "**Android**" >> CHANGELOG_RELEASE.md
          echo "- \`xybrid-android-${CURRENT_TAG}.zip\` - Native .so files for all ABIs" >> CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md
          echo "**Flutter**" >> CHANGELOG_RELEASE.md
          echo "- Precompiled native libraries auto-downloaded by cargokit (no Rust toolchain required)" >> CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md
          echo "**Unity**" >> CHANGELOG_RELEASE.md
          echo "- \`xybrid-unity-sdk-${CURRENT_TAG}.tar.gz\` - Native plugins for all platforms (uploaded by Build Unity workflow)" >> CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md
          echo "**Swift (iOS/macOS)**" >> CHANGELOG_RELEASE.md
          echo "- SPM (recommended): \`.package(url: \"https://github.com/${{ github.repository }}\", exact: \"${CURRENT_TAG#v}\")\`" >> CHANGELOG_RELEASE.md
          echo "- SPM (legacy, deprecated): \`.package(url: \"https://github.com/${{ github.repository }}\", branch: \"swift\")\`" >> CHANGELOG_RELEASE.md
          echo "- \`XybridFFI-${CURRENT_TAG}.xcframework.zip\` - Pre-built XCFramework (iOS arm64 + macOS arm64)" >> CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md
          echo "**CLI**" >> CHANGELOG_RELEASE.md
          echo "- Cross-platform binaries for macOS (arm64, x86_64), Linux (x86_64), and Windows (x86_64)" >> CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}" >> CHANGELOG_RELEASE.md

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: artifacts/*
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  #
  # Publish Swift SDK Package (updates `swift` branch with URL-based Package.swift)
  # Users install via: .package(url: "https://github.com/xybrid-ai/xybrid", branch: "swift")
  #
  publish-swift:
    name: Publish Swift Package
    permissions:
      contents: write   # force-pushes the swift distribution branch
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download XCFramework artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: xcframework
          path: dist

      - name: Compute checksum and generate Package.swift
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          ZIPFILE=$(ls dist/XybridFFI-*.xcframework.zip)
          CHECKSUM=$(shasum -a 256 "$ZIPFILE" | awk '{print $1}')
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/XybridFFI-${TAG}.xcframework.zip"

          echo "Version: $VERSION"
          echo "URL: $URL"
          echo "Checksum: $CHECKSUM"

          # Generate the release Package.swift with URL-based binary target.
          # Linker frameworks must mirror the root Package.swift exactly —
          # MetalPerformanceShaders / MetalPerformanceShadersGraph are required
          # because the XybridFFI xcframework calls into MPS at link time.
          cat > Package.swift << SWIFT_EOF
          // swift-tools-version:5.7
          import PackageDescription

          let package = Package(
              name: "Xybrid",
              platforms: [
                  .iOS(.v13),
                  .macOS(.v10_15)
              ],
              products: [
                  .library(
                      name: "Xybrid",
                      targets: ["Xybrid"]
                  )
              ],
              targets: [
                  .target(
                      name: "Xybrid",
                      dependencies: ["XybridFFI"],
                      path: "Sources/Xybrid",
                      linkerSettings: [
                          .linkedLibrary("c++"),
                          .linkedFramework("Metal"),
                          .linkedFramework("MetalPerformanceShaders"),
                          .linkedFramework("MetalPerformanceShadersGraph"),
                          .linkedFramework("CoreML"),
                          .linkedFramework("Accelerate"),
                          .linkedFramework("Security"),
                      ]
                  ),
                  .binaryTarget(
                      name: "XybridFFI",
                      url: "$URL",
                      checksum: "$CHECKSUM"
                  )
              ]
          )
          SWIFT_EOF

      - name: Publish swift branch
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or update the swift branch
          git checkout --orphan swift-staging

          # Copy only the files needed for the Swift package
          mkdir -p staging/Sources/Xybrid
          cp Package.swift staging/
          cp bindings/apple/Sources/Xybrid/Xybrid.swift staging/Sources/Xybrid/
          cp bindings/apple/Sources/Xybrid/xybrid_uniffi.swift staging/Sources/Xybrid/

          # Switch to clean branch
          git checkout --orphan swift || git checkout swift
          git rm -rf . 2>/dev/null || true

          # Move staged files to root
          cp staging/Package.swift .
          cp -r staging/Sources .
          rm -rf staging

          # Commit and push
          git add Package.swift Sources/
          git commit -m "swift: update to ${TAG}"
          git push origin swift --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
