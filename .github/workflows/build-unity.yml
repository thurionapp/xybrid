name: Build Unity

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_upm:
        description: 'Also publish to UPM branch (normally only on tag push)'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NDK_VERSION: "26.1.10909125"

permissions:
  contents: write

jobs:
  #
  # Version check - verify all package versions match the git tag
  # (reuses the same logic as release.yml)
  #
  check-version:
    name: Verify Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check versions match git tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          UNITY_VERSION=$(python3 -c "import json; print(json.load(open('bindings/unity/package.json'))['version'])")
          echo "Git tag version: $TAG_VERSION"
          echo "Unity package:   $UNITY_VERSION"
          if [ "$UNITY_VERSION" != "$TAG_VERSION" ]; then
            echo ""
            echo "ERROR: Version mismatch! Tag is v$TAG_VERSION but Unity package.json has $UNITY_VERSION"
            echo "Run 'just bump-version $TAG_VERSION' and commit before tagging."
            exit 1
          fi
          echo "Unity version matches v$TAG_VERSION"

  #
  # C# bindings sync check - verify NativeMethods.g.cs is up-to-date
  #
  check-csharp-bindings:
    name: Check C# Bindings
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "unity-csharp-check"

      - name: Regenerate C# bindings
        run: cargo xtask build-ffi --csharp

      - name: Check C# bindings are up-to-date
        run: |
          if ! git diff --exit-code bindings/unity/Runtime/Native/NativeMethods.g.cs; then
            echo ""
            echo "ERROR: C# bindings (NativeMethods.g.cs) are out of date."
            echo "A Rust FFI change was committed without regenerating C# bindings."
            echo ""
            echo "Fix: run 'cargo xtask build-ffi --csharp' and commit the result."
            exit 1
          fi
          echo "C# bindings are up-to-date."

  #
  # macOS native library builds (arm64 + x86_64)
  #
  build-unity-macos:
    name: Build macOS Libraries
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "unity-macos"
          cache-all-crates: "true"
          save-if: "true"

      # Note: Only building arm64. ORT does not provide prebuilt binaries for x86_64-apple-darwin.
      # Intel Macs can run arm64 binaries via Rosetta 2.
      - name: Build for aarch64-apple-darwin
        run: cargo xtask build-ffi --target aarch64-apple-darwin --deploy-unity

      - name: Strip debug symbols (macOS)
        run: strip -x bindings/unity/Runtime/Plugins/macOS/libxybrid_ffi.dylib

      - name: Verify deployed libraries
        run: |
          echo "macOS plugin directory:"
          ls -la bindings/unity/Runtime/Plugins/macOS/ || echo "WARNING: macOS plugin directory not found"
          echo ""
          echo "Checking architecture:"
          file bindings/unity/Runtime/Plugins/macOS/*.dylib || true

      - name: Upload macOS plugins
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unity-plugins-macos
          path: bindings/unity/Runtime/Plugins/macOS/
          if-no-files-found: error

  #
  # Windows native library build (x86_64)
  #
  build-unity-windows:
    name: Build Windows Libraries
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "unity-windows"
          cache-all-crates: "true"
          save-if: "true"

      - name: Build for x86_64-pc-windows-msvc
        run: cargo xtask build-ffi --target x86_64-pc-windows-msvc --deploy-unity

      - name: Strip debug symbols (Windows)
        shell: bash
        run: llvm-strip bindings/unity/Runtime/Plugins/Windows/xybrid_ffi.dll

      - name: Verify deployed libraries
        shell: bash
        run: |
          echo "Windows plugin directory:"
          ls -la bindings/unity/Runtime/Plugins/Windows/ || echo "WARNING: Windows plugin directory not found"

      - name: Upload Windows plugins
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unity-plugins-windows
          path: bindings/unity/Runtime/Plugins/Windows/
          if-no-files-found: error

  #
  # Linux native library build (x86_64)
  #
  build-unity-linux:
    name: Build Linux Libraries
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "unity-linux"
          cache-all-crates: "true"
          save-if: "true"

      - name: Build for x86_64-unknown-linux-gnu
        run: cargo xtask build-ffi --target x86_64-unknown-linux-gnu --deploy-unity

      - name: Strip debug symbols (Linux)
        run: strip --strip-unneeded bindings/unity/Runtime/Plugins/Linux/libxybrid_ffi.so

      - name: Verify deployed libraries
        run: |
          echo "Linux plugin directory:"
          ls -la bindings/unity/Runtime/Plugins/Linux/ || echo "WARNING: Linux plugin directory not found"

      - name: Upload Linux plugins
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unity-plugins-linux
          path: bindings/unity/Runtime/Plugins/Linux/
          if-no-files-found: error

  #
  # Android native library builds (arm64-v8a, armeabi-v7a, x86_64)
  #
  build-unity-android:
    name: Build Android Libraries
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "unity-android"
          cache-all-crates: "true"
          save-if: "true"

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          key: android-ndk-${{ env.NDK_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: Set NDK environment
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache cargo-ndk
        id: cache-cargo-ndk
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/cargo-ndk
          key: cargo-ndk-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-ndk-${{ runner.os }}-

      - name: Install cargo-ndk
        # actions/cache sets cache-hit only on EXACT key match; with
        # restore-keys, a fallback can populate ~/.cargo/bin/cargo-ndk while
        # leaving cache-hit empty, which made the previous `if:`-gated
        # `cargo install` re-run and fail with "binary already exists".
        # `which || install` is idempotent in both states.
        run: which cargo-ndk || cargo install cargo-ndk

      - name: Build for aarch64-linux-android
        run: cargo xtask build-ffi --target aarch64-linux-android --deploy-unity

      - name: Build for armv7-linux-androideabi
        run: cargo xtask build-ffi --target armv7-linux-androideabi --deploy-unity

      - name: Build for x86_64-linux-android
        run: cargo xtask build-ffi --target x86_64-linux-android --deploy-unity

      - name: Strip debug symbols (Android)
        run: |
          NDK_STRIP="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          "$NDK_STRIP" bindings/unity/Runtime/Plugins/Android/arm64-v8a/libxybrid_ffi.so
          "$NDK_STRIP" bindings/unity/Runtime/Plugins/Android/armeabi-v7a/libxybrid_ffi.so
          "$NDK_STRIP" bindings/unity/Runtime/Plugins/Android/x86_64/libxybrid_ffi.so

      - name: Verify deployed libraries
        run: |
          echo "Android plugin directory:"
          ABIS=("arm64-v8a" "armeabi-v7a" "x86_64")
          for abi in "${ABIS[@]}"; do
            ABI_DIR="bindings/unity/Runtime/Plugins/Android/$abi"
            if [ ! -d "$ABI_DIR" ]; then
              echo "ERROR: ABI directory not found: $ABI_DIR"
              exit 1
            fi
            echo ""
            echo "=== $abi ==="
            ls -la "$ABI_DIR/"
            file "$ABI_DIR/libxybrid_ffi.so"
          done

      - name: Upload Android plugins
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unity-plugins-android
          path: bindings/unity/Runtime/Plugins/Android/
          if-no-files-found: error

  #
  # iOS native library build (arm64 static)
  #
  build-unity-ios:
    name: Build iOS Libraries
    needs: [check-version]
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "unity-ios"
          cache-all-crates: "true"
          save-if: "true"

      - name: Verify ORT iOS library
        run: |
          if [ ! -f "vendor/ort-ios/onnxruntime.xcframework/ios-arm64/libonnxruntime.a" ]; then
            echo "ERROR: ORT iOS library not found at vendor/ort-ios/onnxruntime.xcframework/ios-arm64/libonnxruntime.a"
            echo "Ensure the ort-ios submodule is checked out correctly."
            exit 1
          fi
          echo "ORT iOS library found."

      - name: Build for aarch64-apple-ios
        run: cargo xtask build-ffi --target aarch64-apple-ios --deploy-unity

      - name: Strip debug symbols (iOS)
        run: strip -S bindings/unity/Runtime/Plugins/iOS/libxybrid_ffi.a

      - name: Verify deployed libraries
        run: |
          echo "iOS plugin directory:"
          ls -la bindings/unity/Runtime/Plugins/iOS/ || echo "WARNING: iOS plugin directory not found"
          echo ""
          echo "Checking file type:"
          file bindings/unity/Runtime/Plugins/iOS/*.a || true

      - name: Upload iOS plugins
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unity-plugins-ios
          path: bindings/unity/Runtime/Plugins/iOS/
          if-no-files-found: error

  #
  # Package all platform plugins into a single Unity SDK archive
  #
  package-unity:
    name: Package Unity SDK
    needs: [check-csharp-bindings, build-unity-macos, build-unity-windows, build-unity-linux, build-unity-ios, build-unity-android]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all Unity plugin artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: unity-plugins-*
          path: downloaded-plugins

      - name: Assemble plugins into Unity package
        run: |
          # Create the target plugin directory
          mkdir -p bindings/unity/Runtime/Plugins

          # Map lowercase artifact names to Unity-standard capitalized directory names
          declare -A PLATFORM_MAP=(
            [macos]="macOS"
            [windows]="Windows"
            [linux]="Linux"
            [android]="Android"
            [ios]="iOS"
          )

          # Move each platform's plugins into the correct directory
          for platform_dir in downloaded-plugins/unity-plugins-*/; do
            ARTIFACT_NAME=$(basename "$platform_dir" | sed 's/unity-plugins-//')
            PLATFORM="${PLATFORM_MAP[$ARTIFACT_NAME]:-$ARTIFACT_NAME}"
            echo "Assembling $ARTIFACT_NAME → $PLATFORM..."
            mkdir -p "bindings/unity/Runtime/Plugins/$PLATFORM"
            cp -r "$platform_dir"/* "bindings/unity/Runtime/Plugins/$PLATFORM/"
          done

          echo ""
          echo "Final plugin directory structure:"
          find bindings/unity/Runtime/Plugins -type f | sort

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('bindings/unity/package.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Unity SDK version: $VERSION"

      - name: Create SDK archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          tar -czf "xybrid-unity-sdk-${VERSION}.tar.gz" -C bindings unity
          echo "Created xybrid-unity-sdk-${VERSION}.tar.gz"
          ls -lh "xybrid-unity-sdk-${VERSION}.tar.gz"

      - name: Upload Unity SDK package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unity-sdk-package
          path: xybrid-unity-sdk-*.tar.gz
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # The release is created by release.yml which runs in parallel.
          # Wait up to 10 minutes for it to appear, checking every 30 seconds.
          for i in $(seq 1 20); do
            if gh release view "v${VERSION}" > /dev/null 2>&1; then
              echo "Release v${VERSION} found — uploading Unity SDK..."
              gh release upload "v${VERSION}" "xybrid-unity-sdk-${VERSION}.tar.gz" --clobber
              echo "Upload complete."
              exit 0
            fi
            echo "Waiting for release v${VERSION} to be created by release.yml... (attempt $i/20)"
            sleep 30
          done
          echo "WARNING: Release v${VERSION} was not created within 10 minutes."
          echo "Unity SDK is available as a CI artifact — upload manually with:"
          echo "  gh release upload v${VERSION} xybrid-unity-sdk-${VERSION}.tar.gz --clobber"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  #
  # Publish UPM branch — enables Unity Package Manager install via Git URL:
  #   https://github.com/xybrid-ai/xybrid.git#upm
  #
  # This job takes the assembled Unity package (with all native libraries from CI)
  # and pushes it to the `upm` branch with package.json at root.
  #
  publish-upm:
    name: Publish UPM Branch
    needs: [package-unity]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_upm == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download all Unity plugin artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: unity-plugins-*
          path: downloaded-plugins

      - name: Assemble plugins into Unity package
        run: |
          # Map lowercase artifact names to Unity-standard capitalized directory names
          declare -A PLATFORM_MAP=(
            [macos]="macOS"
            [windows]="Windows"
            [linux]="Linux"
            [android]="Android"
          )
          # NOTE: iOS is intentionally excluded from the UPM branch.
          # libxybrid_ffi.a embeds ORT statically (~326 MB), exceeding GitHub's 100 MB
          # hard file size limit. iOS Unity support requires manual setup.
          # See bindings/unity/README.md#ios-installation for instructions.

          for platform_dir in downloaded-plugins/unity-plugins-*/; do
            ARTIFACT_NAME=$(basename "$platform_dir" | sed 's/unity-plugins-//')

            if [[ "$ARTIFACT_NAME" == "ios" ]]; then
              echo "Skipping ios -- excluded from UPM branch (see README for manual iOS setup)"
              continue
            fi

            PLATFORM="${PLATFORM_MAP[$ARTIFACT_NAME]:-$ARTIFACT_NAME}"
            echo "Assembling $ARTIFACT_NAME -> $PLATFORM..."
            mkdir -p "bindings/unity/Runtime/Plugins/$PLATFORM"
            cp -r "$platform_dir"/* "bindings/unity/Runtime/Plugins/$PLATFORM/"
          done

          echo ""
          echo "Assembled plugin structure:"
          find bindings/unity/Runtime/Plugins -type f -not -name '.DS_Store' | sort

      - name: Publish to upm branch
        run: |
          # Get version from tag or from package.json (manual dispatch)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(python3 -c "import json; print(json.load(open('bindings/unity/package.json'))['version'])")
          fi
          echo "Publishing UPM branch for version: $VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Increase post buffer for large native binary push (~200 MB)
          git config http.postBuffer 524288000

          # Prepare package contents in a temp directory
          PACKAGE_DIR=$(mktemp -d)
          cp -r bindings/unity/* "$PACKAGE_DIR/"

          # Remove .gitignore that blocks native libs — we WANT them on the upm branch
          rm -f "$PACKAGE_DIR/Runtime/Plugins/.gitignore"

          # Remove iOS directory entirely — binary excluded due to 100 MB git limit.
          # The .meta files would otherwise cause Unity "orphaned meta" errors.
          rm -rf "$PACKAGE_DIR/Runtime/Plugins/iOS"

          # Remove .gitkeep files (no longer needed with real binaries)
          find "$PACKAGE_DIR" -name ".gitkeep" -delete
          find "$PACKAGE_DIR" -name ".gitkeep.meta" -delete

          # Remove .DS_Store files
          find "$PACKAGE_DIR" -name ".DS_Store" -delete

          # Switch to upm branch (orphan if it doesn't exist)
          # Use -f to discard downloaded native binaries already in working tree
          # (they're safely copied to $PACKAGE_DIR above)
          if git ls-remote --exit-code origin upm > /dev/null 2>&1; then
            git fetch origin upm
            git checkout -f upm
            # Clear all existing files
            git rm -rf . > /dev/null 2>&1 || true
          else
            git checkout --orphan upm
            git rm -rf . > /dev/null 2>&1 || true
          fi

          # Clean untracked files from checkout (downloaded-plugins, etc.)
          git clean -fd

          # Copy package contents to repo root (package.json at root for UPM)
          cp -r "$PACKAGE_DIR"/* .
          rm -rf "$PACKAGE_DIR"

          # Stage everything including native binaries
          git add -A

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit — upm branch is already up to date."
          else
            git commit -m "v${VERSION} — Unity SDK with native libraries"
            git push origin upm --force
            echo "Pushed upm branch with v${VERSION}"
          fi

          # Create a version-specific tag on the upm branch
          git tag -f "upm/v${VERSION}"
          git push origin "upm/v${VERSION}" --force
          echo "Tagged upm/v${VERSION}"

          echo ""
          echo "Unity users can now install via Package Manager:"
          echo "  Latest:  https://github.com/xybrid-ai/xybrid.git#upm"
          echo "  Pinned:  https://github.com/xybrid-ai/xybrid.git#upm/v${VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
