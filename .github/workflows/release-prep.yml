name: Release Prep

# Release-branch flow, step 1 of 2. Companion: release-publish.yml.
#
# Trigger: push to a `release/v*` branch. The maintainer's local ritual is:
#
#     git switch -c release/v0.1.0-rc4 origin/master
#     just bump-version 0.1.0-rc4          # bumps versions, scaffolds changelog
#     /update-version-docs 0.1.0-rc4       # LLM-assisted changelog fill
#     git add -A && git commit -m "bump: 0.1.0-rc4"
#     git push -u origin release/v0.1.0-rc4
#
# Once the branch is pushed this workflow runs and:
#
#   1. Verifies the branch name maps to a version that matches every
#      package manifest (Cargo workspace, pubspec.yaml, package.json,
#      build.gradle.kts, Package.swift sdkVersion).
#   2. Builds every release artifact on the release branch (xcframework,
#      android .so, Flutter precompiled binaries, CLI binaries).
#   3. Pulls the xcframework zip, computes its SHA-256, patches
#      Package.swift's xybridFFIChecksum on the release branch, commits and
#      pushes that patch back. Pushes by GITHUB_TOKEN do not re-trigger
#      workflows, so this doesn't loop.
#   4. Creates a DRAFT GitHub Release tagged v<version> with
#      target_commitish pointing at the release branch, and uploads every
#      artifact as a release asset. Draft asset URLs are not yet public —
#      only repo collaborators can fetch them while the release is in draft.
#   5. Opens a PR: release/v<version> → master.
#
# At this point a human reviews the PR. Nothing is published externally:
# no public release, no crates.io / pub.dev / Maven Central publishes, no
# git tag (drafts hold a target tag name but only materialize the tag at
# publish time). Closing the PR without merging aborts cleanly; the draft
# release lingers until the next release-prep run replaces it.
#
# Once the PR merges, release-publish.yml takes over.

on:
  push:
    branches: ['release/v*']

# Cancel in-flight runs when the maintainer pushes again to the same
# release branch (e.g. a changelog fixup) — no point finishing a stale
# build matrix.
concurrency:
  group: release-prep-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NDK_VERSION: "26.1.10909125"
  FLUTTER_VERSION: "3.35.7"
  FRB_VERSION: "2.11.1"

# Read-only by default. Write scopes are granted per-job only where needed:
#   - contents: write   -> patch-spm-checksum, create-draft-release, and the
#     precompile-flutter-{darwin,linux,windows} jobs (cargokit
#     precompile-binaries creates/uploads release assets)
#   - contents + pull-requests: write -> open-release-pr
#   - id-token + attestations: write  -> build-xcframework, build-cli-macos,
#     build-android, build-cli (the jobs that call `attest-build-provenance`)
# Keeping these off the workflow level means the remaining jobs don't get
# unnecessary OIDC-issuance, release-write, or attestation-write privileges.
permissions: read-all

jobs:
  # =========================================================================
  # Parse the branch name, verify every per-package version file matches.
  # =========================================================================
  check-release-branch:
    name: Verify release branch
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.meta.outputs.branch }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Parse branch / version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF#refs/heads/}"
          case "$BRANCH" in
            release/v*) ;;
            *) echo "::error::Expected release/v* branch, got $BRANCH"; exit 1 ;;
          esac
          TAG="${BRANCH#release/}"
          VERSION="${TAG#v}"
          echo "branch=$BRANCH"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Release branch:  $BRANCH"
          echo "Release version: $VERSION"

      - name: Check versions match release branch
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          CARGO_VERSION=$(grep -A5 '\[workspace\.package\]' Cargo.toml | grep '^version' | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          FLUTTER_VERSION_PKG=$(grep '^version:' bindings/flutter/pubspec.yaml | sed 's/version: *//')
          UNITY_VERSION=$(python3 -c "import json; print(json.load(open('bindings/unity/package.json'))['version'])")
          KOTLIN_VERSION=$(grep '^version = ' bindings/kotlin/build.gradle.kts | sed 's/version = "\(.*\)"/\1/')
          SWIFT_VERSION=$(grep '^let sdkVersion = ' Package.swift | sed 's/let sdkVersion = "\(.*\)"/\1/')

          echo "Cargo:   $CARGO_VERSION"
          echo "Flutter: $FLUTTER_VERSION_PKG"
          echo "Unity:   $UNITY_VERSION"
          echo "Kotlin:  $KOTLIN_VERSION"
          echo "Swift:   $SWIFT_VERSION"

          FAILED=0
          for V in "$CARGO_VERSION" "$FLUTTER_VERSION_PKG" "$UNITY_VERSION" "$KOTLIN_VERSION" "$SWIFT_VERSION"; do
            if [ "$V" != "$VERSION" ]; then
              echo "::error::Version mismatch — branch is $VERSION but found $V"
              echo "Run 'just bump-version $VERSION' on the release branch and push the result."
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

  # =========================================================================
  # Apple builds split into three parallel macos-14 jobs.
  #
  # Previously these ran sequentially on one runner to amortize sccache /
  # toolchain setup. The bundled job was the critical-path long pole
  # (~25 min). Splitting them puts xcframework + flutter-darwin + CLI on
  # the wall-clock floor of just the slowest (xcframework cold compile).
  # Each job pays its own ~2-min toolchain/sccache setup, paid in parallel.
  #
  # sccache itself is GH-Actions-cache backed and shared across jobs, so
  # the second-run wall clock benefits from the shared cache regardless.
  # =========================================================================

  # ----- Apple job 1/3: XCFramework (critical path; gates patch-spm-checksum)
  build-xcframework:
    name: Build XCFramework
    needs: [check-release-branch]
    runs-on: macos-14
    permissions:
      contents: read       # actions/checkout
      id-token: write      # Sigstore OIDC for attest-build-provenance
      attestations: write  # GitHub attestations API
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "apple-xcframework"
          cache-all-crates: "true"
          save-if: "true"

      # `cargo xtask build-xcframework` shells out to `boltffi pack apple`, so
      # the CLI must be present here just as it is in the Android job. Without
      # it the build fails with "Failed to run `boltffi pack apple`. Install
      # with `cargo install boltffi_cli`." Cache + pin to 0.25.3 to match the
      # runtime `boltffi` crate (Cargo.lock) — a CLI/runtime skew mis-generates
      # the bindings (see the Android job's note).
      - name: Cache boltffi CLI
        id: cache-boltffi
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/boltffi
          key: boltffi-cli-${{ runner.os }}-0.25.3

      - name: Install boltffi CLI
        run: which boltffi || cargo install boltffi_cli --version 0.25.3 --locked

      - name: Build XCFramework
        run: cargo xtask build-xcframework --release

      - name: Prepare XCFramework artifact
        shell: bash
        env:
          TAG: ${{ needs.check-release-branch.outputs.tag }}
        run: |
          mkdir -p dist
          cd bindings/apple/XCFrameworks
          zip -r ../../../dist/XybridFFI-${TAG}.xcframework.zip XybridFFI.xcframework

      - name: Attest XCFramework provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: dist/XybridFFI-${{ needs.check-release-branch.outputs.tag }}.xcframework.zip

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: xcframework
          path: dist/XybridFFI-*.xcframework.zip
          if-no-files-found: error

  # ----- Apple job 2/3: Flutter darwin precompile (parallel; not on SPM path)
  precompile-flutter-darwin:
    name: Precompile Flutter (darwin)
    permissions:
      contents: write   # cargokit precompile-binaries uploads release assets
    needs: [check-release-branch]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-apple-ios,
            aarch64-apple-ios-sim,
            aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "flutter-darwin"
          cache-all-crates: "true"
          save-if: "true"

      # Matches the LLVM install on the Linux/Windows Flutter precompile
      # jobs. Conservative: cargokit may invoke clang somewhere; verifying
      # whether macOS strictly needs this is a follow-up.
      - name: Install LLVM
        run: brew install llvm

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Install build tool dependencies
        working-directory: bindings/flutter/cargokit/build_tool
        run: dart pub get

      - name: Precompile and upload Flutter darwin binaries
        working-directory: bindings/flutter/cargokit/build_tool
        shell: bash
        env:
          PRIVATE_KEY: ${{ secrets.CARGOKIT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dart run bin/build_tool.dart precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir ${{ github.workspace }}/bindings/flutter/rust \
            --verbose

  # ----- Apple job 3/3: CLI macos-arm64 (parallel)
  build-cli-macos:
    name: Build CLI (macos-arm64)
    needs: [check-release-branch]
    runs-on: macos-14
    permissions:
      contents: read       # actions/checkout
      id-token: write      # Sigstore OIDC for attest-build-provenance
      attestations: write  # GitHub attestations API
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "cli-macos-arm64"
          cache-all-crates: "true"
          save-if: "true"

      - name: Build CLI (macos-arm64)
        run: cargo build --release -p xybrid-cli --target aarch64-apple-darwin --features platform-macos

      - name: Strip CLI binary
        run: strip target/aarch64-apple-darwin/release/xybrid

      - name: Prepare CLI artifact
        shell: bash
        env:
          TAG: ${{ needs.check-release-branch.outputs.tag }}
        run: |
          mkdir -p dist-cli
          cp target/aarch64-apple-darwin/release/xybrid dist-cli/xybrid-${TAG}-macos-arm64
          chmod +x dist-cli/xybrid-${TAG}-macos-arm64

      - name: Attest macOS CLI provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: dist-cli/xybrid-${{ needs.check-release-branch.outputs.tag }}-macos-arm64

      - name: Upload CLI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-macos-arm64
          path: dist-cli/*

  # =========================================================================
  # Android .so files build (Linux with NDK).
  # =========================================================================
  build-android:
    name: Build Android
    needs: [check-release-branch]
    runs-on: ubuntu-latest
    permissions:
      contents: read       # actions/checkout
      id-token: write      # Sigstore OIDC for attest-build-provenance
      attestations: write  # GitHub attestations API
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "android-ndk"
          cache-all-crates: "true"
          save-if: "true"

      - name: Setup Android NDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Resolve NDK install path
        shell: bash
        run: echo "NDK_DIR=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.NDK_DIR }}
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}

      - name: Install NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: Set ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=${{ env.NDK_DIR }}" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: which cargo-ndk || cargo install cargo-ndk

      # boltffi CLI provides the `boltffi pack android` the build script
      # (tools/scripts/build-android-bolt.sh) calls. The standalone
      # build-android.yml / test-ci.yml jobs install it; release-prep must too,
      # or `cargo xtask build-android` fails with `boltffi: command not found`.
      # Cache the installed binary across runs.
      - name: Cache boltffi CLI
        id: cache-boltffi
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/bin/boltffi
          key: boltffi-cli-${{ runner.os }}-0.25.3

      - name: Install boltffi CLI
        # `which || install` is idempotent whether or not the cache populated
        # the binary. Pinned to 0.25.3 to MATCH the runtime `boltffi` crate
        # (Cargo.lock): a CLI/runtime skew mis-generates unit-ok `Result<(), E>`
        # exports as a `void` foreign function that drops the error and leaks
        # the result buffer. `--locked` installs against the CLI's bundled lock.
        run: which boltffi || cargo install boltffi_cli --version 0.25.3 --locked

      - name: Build Android .so files
        run: cargo xtask build-android --release

      - name: Prepare artifact with version
        shell: bash
        env:
          TAG: ${{ needs.check-release-branch.outputs.tag }}
        run: |
          mkdir -p dist
          cd bindings/kotlin/libs
          zip -r ../../../dist/xybrid-android-${TAG}.zip .

      - name: Attest Android artifact provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: dist/xybrid-android-${{ needs.check-release-branch.outputs.tag }}.zip

      - name: Upload Android artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-libs
          path: dist/xybrid-android-*.zip
          if-no-files-found: error

  # =========================================================================
  # Flutter precompiled binaries — Linux (waits for build-android sccache).
  # =========================================================================
  precompile-flutter-linux:
    name: Precompile Flutter (linux)
    permissions:
      contents: write   # cargokit precompile-binaries uploads release assets
    needs: [check-release-branch, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: >-
            x86_64-unknown-linux-gnu,
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "flutter-linux"
          cache-all-crates: "true"
          save-if: "true"

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Resolve NDK install path
        shell: bash
        run: echo "NDK_DIR=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.NDK_DIR }}
          key: ndk-${{ runner.os }}-${{ env.NDK_VERSION }}

      - name: Install Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: Set ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=${{ env.NDK_DIR }}" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: which cargo-ndk || cargo install cargo-ndk

      - name: Install build tool dependencies
        working-directory: bindings/flutter/cargokit/build_tool
        run: dart pub get

      - name: Precompile and upload binaries
        working-directory: bindings/flutter/cargokit/build_tool
        shell: bash
        env:
          PRIVATE_KEY: ${{ secrets.CARGOKIT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dart run bin/build_tool.dart precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir ${{ github.workspace }}/bindings/flutter/rust \
            --verbose \
            --android-sdk-location $ANDROID_HOME \
            --android-ndk-version ${{ env.NDK_VERSION }} \
            --android-min-sdk-version 28

  # =========================================================================
  # Flutter precompiled binaries — Windows.
  # =========================================================================
  precompile-flutter-windows:
    name: Precompile Flutter (windows)
    permissions:
      contents: write   # cargokit precompile-binaries uploads release assets
    needs: [check-release-branch]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "flutter-windows"
          cache-all-crates: "true"
          save-if: "true"

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Install LLVM and NASM
        run: choco install llvm nasm

      - name: Add NASM to PATH
        shell: bash
        run: echo "C:\\Program Files\\NASM" >> $GITHUB_PATH

      - name: Install build tool dependencies
        working-directory: bindings/flutter/cargokit/build_tool
        run: dart pub get

      - name: Force dynamic CRT (required for cdylib DLL linking)
        shell: bash
        run: |
          echo "CFLAGS=-MD" >> $GITHUB_ENV
          echo "CXXFLAGS=-MD" >> $GITHUB_ENV

      - name: Precompile and upload binaries
        working-directory: bindings/flutter/cargokit/build_tool
        shell: bash
        env:
          PRIVATE_KEY: ${{ secrets.CARGOKIT_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MANIFEST_DIR="${GITHUB_WORKSPACE//\\//}/bindings/flutter/rust"
          dart run bin/build_tool.dart precompile-binaries \
            --repository ${{ github.repository }} \
            --manifest-dir "$MANIFEST_DIR" \
            --verbose

  # =========================================================================
  # CLI builds (Linux + Windows; macOS is built in build-apple-all).
  # =========================================================================
  build-cli:
    name: Build CLI (${{ matrix.name }})
    needs: [check-release-branch]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read       # actions/checkout
      id-token: write      # Sigstore OIDC for attest-build-provenance
      attestations: write  # GitHub attestations API
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: xybrid
            features: platform-desktop

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: xybrid.exe
            features: platform-desktop

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Configure sccache environment
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: "v1-rust"
          shared-key: "cli-${{ matrix.name }}"
          cache-all-crates: "true"
          save-if: "true"

      - name: Build CLI
        run: cargo build --release -p xybrid-cli --target ${{ matrix.target }} --features ${{ matrix.features }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Prepare artifact
        id: prepare
        shell: bash
        env:
          TAG: ${{ needs.check-release-branch.outputs.tag }}
        run: |
          mkdir -p dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ARTIFACT="dist/xybrid-${TAG}-${{ matrix.name }}.exe"
          else
            ARTIFACT="dist/xybrid-${TAG}-${{ matrix.name }}"
          fi
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} "$ARTIFACT"
          [ "${{ runner.os }}" != "Windows" ] && chmod +x "$ARTIFACT" || true
          echo "artifact_path=$ARTIFACT" >> "$GITHUB_OUTPUT"

      - name: Attest CLI provenance (${{ matrix.name }})
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: ${{ steps.prepare.outputs.artifact_path }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.name }}
          path: dist/*

  # =========================================================================
  # Patch Package.swift checksum and commit it back to the release branch.
  #
  # Pushes by GITHUB_TOKEN do not re-trigger workflow events
  # (https://docs.github.com/en/actions/security-guides/automatic-token-authentication),
  # so the checksum commit doesn't loop release-prep.
  # =========================================================================
  patch-spm-checksum:
    name: Patch SPM checksum
    permissions:
      contents: write   # commits the pinned SPM checksum and pushes the branch
    needs: [check-release-branch, build-xcframework]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download xcframework artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: xcframework
          path: dist

      - name: Patch and push Package.swift checksum
        shell: bash
        env:
          TAG: ${{ needs.check-release-branch.outputs.tag }}
          BRANCH: ${{ needs.check-release-branch.outputs.branch }}
        run: |
          set -euo pipefail
          ZIP="dist/XybridFFI-${TAG}.xcframework.zip"
          ./bindings/apple/scripts/sync-spm-checksum.sh "$ZIP"

          if git diff --quiet Package.swift; then
            echo "::notice::Package.swift checksum already matches built zip — nothing to commit."
            exit 0
          fi

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Package.swift
          git commit -m "chore(release): pin XybridFFI checksum for ${TAG}"
          git push origin "HEAD:${BRANCH}"

  # =========================================================================
  # Create the DRAFT release with every artifact attached.
  #
  # target_commitish = release branch. The git tag is NOT created yet —
  # drafts hold a tag name but only materialize the tag at publish time.
  # release-publish.yml will retarget to the merge commit and publish.
  # =========================================================================
  create-draft-release:
    name: Create draft release
    permissions:
      contents: write   # gh release create/delete of the draft release
    needs:
      - check-release-branch
      - patch-spm-checksum
      - build-cli-macos
      - precompile-flutter-darwin
      - build-android
      - build-cli
      - precompile-flutter-linux
      - precompile-flutter-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate changelog
        env:
          TAG: ${{ needs.check-release-branch.outputs.tag }}
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 origin/master 2>/dev/null || echo "")
          {
            echo "## What's Changed"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s"
            else
              git log --pretty=format:"- %s" -n 20
            fi
            echo
            echo
            echo "### Artifacts"
            echo
            echo "**Android**"
            echo "- \`xybrid-android-${TAG}.zip\` — Native .so files for all ABIs"
            echo
            echo "**Flutter**"
            echo "- Precompiled native libraries auto-downloaded by cargokit"
            echo
            echo "**Unity**"
            echo "- \`xybrid-unity-sdk-${TAG}.tar.gz\` — Native plugins (uploaded by Build Unity workflow)"
            echo
            echo "**Swift (iOS/macOS)**"
            echo "- SPM: \`.package(url: \"https://github.com/${{ github.repository }}\", from: \"${TAG#v}\")\`"
            echo "- \`XybridFFI-${TAG}.xcframework.zip\` — Pre-built XCFramework"
            echo
            echo "**CLI**"
            echo "- Cross-platform binaries for macOS (arm64, x86_64), Linux (x86_64), and Windows (x86_64)"
            echo
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          } > CHANGELOG_RELEASE.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-release-branch.outputs.tag }}
          BRANCH: ${{ needs.check-release-branch.outputs.branch }}
        run: |
          set -euo pipefail
          # If a release already exists for this tag, clean it up *only* if
          # it's still a draft (e.g. a previous release-prep run that never
          # got merged). Refuse to touch published releases — a fixup push
          # to a stale release/v* branch must not silently wipe a real
          # release and its git tag.
          STATE=$(gh release view "$TAG" --json isDraft -q .isDraft 2>/dev/null || echo "missing")
          case "$STATE" in
            true)
              echo "::notice::Deleting pre-existing DRAFT release for ${TAG} so this run can recreate it."
              # NOTE: no --cleanup-tag here. A draft release has no materialized
              # git tag (drafts only hold a tag *name*; the ref is created at
              # publish time), so `--cleanup-tag` 422s with "Reference does not
              # exist" and aborts this step *after* deleting the release —
              # leaving the branch with no draft at all. Deleting just the
              # release is correct; there is no tag to clean up.
              gh release delete "$TAG" --yes
              ;;
            false)
              echo "::error::Release ${TAG} is already PUBLISHED. Refusing to delete. Bump the version on this branch (or pick a new branch name) and re-push."
              exit 1
              ;;
            missing)
              ;;
          esac

          PRERELEASE_FLAG=""
          case "$TAG" in
            *alpha*|*beta*|*rc*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          gh release create "$TAG" \
            --draft \
            $PRERELEASE_FLAG \
            --target "$BRANCH" \
            --title "$TAG" \
            --notes-file CHANGELOG_RELEASE.md \
            artifacts/*

  # =========================================================================
  # Generate a CycloneDX SBOM for the released crates and attach it to the
  # draft release. Independent of the release gate: this job is not required
  # by open-release-pr, and continue-on-error keeps an SBOM-tooling hiccup
  # from ever marking a release run failed.
  # =========================================================================
  attach-sbom:
    name: Attach SBOM
    permissions:
      contents: write   # gh release upload of the SBOM assets
    needs: [check-release-branch, create-draft-release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOMs (JSON)
        # Resolves from Cargo.lock — no project build needed. Emits a
        # <crate>.cdx.json next to each workspace member's Cargo.toml.
        run: cargo cyclonedx --format json

      - name: Attach SBOMs for the published artifacts to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-release-branch.outputs.tag }}
        run: |
          set -euo pipefail
          # Upload the SBOMs for the published library crate and the CLI binary
          # (each captures its full transitive dependency tree).
          cp crates/xybrid/xybrid.cdx.json         "xybrid-${TAG}.cdx.json"
          cp crates/xybrid-cli/xybrid-cli.cdx.json "xybrid-cli-${TAG}.cdx.json"
          gh release upload "$TAG" \
            "xybrid-${TAG}.cdx.json" \
            "xybrid-cli-${TAG}.cdx.json" \
            --clobber

  # =========================================================================
  # Open the release PR (if not already open).
  # =========================================================================
  open-release-pr:
    name: Open release PR
    permissions:
      contents: read
      pull-requests: write   # gh pr create for the release PR
    needs: [check-release-branch, create-draft-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Open PR (if not already open)
        env:
          # Prefer a PAT (RELEASE_PAT) over GITHUB_TOKEN to OPEN the PR.
          # GitHub does not trigger `pull_request` workflows for PRs opened by
          # GITHUB_TOKEN (loop prevention), so with the default token the
          # branch-protection-required `CI Success` check never runs on the PR
          # head and the release PR can never be merged without an admin
          # bypass. Opening the PR with a PAT makes ci.yml's `pull_request`
          # trigger fire and the required check report. Falls back to
          # GITHUB_TOKEN when RELEASE_PAT is unset (PR opens, but `CI Success`
          # stays pending — merge then needs a manual CI run or admin bypass).
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-release-branch.outputs.tag }}
          BRANCH: ${{ needs.check-release-branch.outputs.branch }}
        run: |
          set -euo pipefail
          EXISTING=$(gh pr list --head "$BRANCH" --base master --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "::notice::PR #${EXISTING} already open for ${BRANCH}."
            exit 0
          fi

          BODY=$(cat <<EOF
          Release **${TAG}**.

          Artifacts are staged in a [draft release](https://github.com/${{ github.repository }}/releases/tag/${TAG}).

          When this PR merges, the **Release Publish** workflow will:
          - Tag the merge commit \`${TAG}\`
          - Publish the draft release (asset URLs become public)
          - Publish to crates.io, pub.dev, and Maven Central
          - Update the \`swift\` branch

          Close this PR (without merging) to abort. The draft release will
          be cleaned up by the next \`release-prep\` run.
          EOF
          )

          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Release ${TAG}" \
            --body "$BODY" \
            --label release
