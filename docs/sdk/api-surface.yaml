# API Surface Contract
# Machine-readable companion to API_REFERENCE.md
#
# This file is parsed by tools/scripts/api-contract-check.sh and the /sync-api command.
# Status values: implemented, partial, stub, planned
#
# IMPORTANT: When modifying SDK public APIs, update BOTH this file and API_REFERENCE.md.

version: "0.1.0"

classes:

  # -------------------------------------------------------------------
  # 1. Xybrid (Entry Point)
  # -------------------------------------------------------------------
  Xybrid:
    type: singleton
    section: "1. Xybrid (Entry Point)"
    methods:
      init:
        async: true
        status: { dart: implemented, kotlin: implemented, swift: planned, csharp: implemented }
      setApiKey:
        params: [{ name: apiKey, type: String }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      model:
        params:
          - { name: modelId, type: "String?" }
          - { name: platform, type: "String?" }
          - { name: bundlePath, type: "String?" }
          - { name: modelDir, type: "String?" }
        return: XybridModelLoader
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      pipeline:
        params:
          - { name: yaml, type: "String?" }
          - { name: filePath, type: "String?" }
        return: XybridPipelineRef
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      isModelCached:
        params: [{ name: modelId, type: String }]
        return: bool
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }

  # -------------------------------------------------------------------
  # 2. XybridModelLoader
  # -------------------------------------------------------------------
  XybridModelLoader:
    type: class
    section: "2. XybridModelLoader"
    methods:
      fromRegistry:
        static: true
        params: [{ name: modelId, type: String }]
        return: XybridModelLoader
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      fromBundle:
        static: true
        params: [{ name: path, type: String }]
        return: XybridModelLoader
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      fromDirectory:
        static: true
        params: [{ name: path, type: String }]
        return: XybridModelLoader
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      fromModelFile:
        static: true
        params: [{ name: filePath, type: String }]
        return: XybridModelLoader
        notes: "Loads a raw GGUF file directly. Auto-generates model_metadata.json from GGUF binary header if not present."
        status: { dart: planned, kotlin: planned, swift: planned, csharp: implemented }
      fromHuggingFace:
        static: true
        params: [{ name: repo, type: String }]
        return: XybridModelLoader
        notes: "Requires huggingface feature flag. Downloads and caches model files from HuggingFace Hub."
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      load:
        async: true
        return: XybridModel
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      loadWithProgress:
        return: "Stream<LoadEvent>"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }

  # -------------------------------------------------------------------
  # 3. XybridModel
  # -------------------------------------------------------------------
  XybridModel:
    type: class
    section: "3. XybridModel"
    properties:
      modelId:
        type: String
        status: { dart: planned, kotlin: planned, swift: planned, csharp: implemented }
      voices:
        type: "List<VoiceInfo>?"
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
      defaultVoice:
        type: "VoiceInfo?"
        status: { dart: planned, kotlin: partial, swift: partial, csharp: implemented }
      hasVoices:
        type: bool
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
    methods:
      voice:
        params: [{ name: voiceId, type: String }]
        return: "VoiceInfo?"
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
      run:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: config, type: "GenerationConfig?", default: "null" }
        return: XybridResult
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      runWithOptions:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: options, type: RunOptions }
        return: XybridResult
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      runWithContext:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: context, type: ConversationContext }
          - { name: config, type: "GenerationConfig?", default: "null" }
        return: XybridResult
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      runWithContextOptions:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: context, type: ConversationContext }
          - { name: options, type: RunOptions }
        return: XybridResult
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      runStreaming:
        params:
          - { name: envelope, type: Envelope }
          - { name: config, type: "GenerationConfig?" }
        return: "Stream<StreamToken>"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      runStreamingWithOptions:
        params:
          - { name: envelope, type: Envelope }
          - { name: options, type: RunOptions }
        return: "Stream<StreamToken>"
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      runStreamingWithContext:
        params:
          - { name: envelope, type: Envelope }
          - { name: context, type: ConversationContext }
          - { name: config, type: "GenerationConfig?" }
        return: "Stream<StreamToken>"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      runStreamingWithContextOptions:
        params:
          - { name: envelope, type: Envelope }
          - { name: context, type: ConversationContext }
          - { name: options, type: RunOptions }
        return: "Stream<StreamToken>"
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      benchmark:
        async: true
        status: { dart: planned, kotlin: planned, swift: planned, csharp: planned }
      unload:
        status: { dart: planned, kotlin: planned, swift: planned, csharp: planned }
      executionProviderInfo:
        return: ExecutionProviderInfo
        status: { dart: planned, kotlin: planned, swift: planned, csharp: planned }

  # -------------------------------------------------------------------
  # 4. XybridPipeline
  # -------------------------------------------------------------------
  XybridPipeline:
    type: class
    section: "4. XybridPipelineRef / XybridPipeline"
    methods:
      fromYaml:
        static: true
        params: [{ name: yamlContent, type: String }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      fromFile:
        static: true
        params: [{ name: path, type: String }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      fromBundle:
        static: true
        params: [{ name: path, type: String }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      load:
        async: true
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      run:
        async: true
        params: [{ name: envelope, type: Envelope }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      runWithOptions:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: options, type: RunOptions }
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
    properties:
      name:
        type: "String?"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      isReady:
        type: bool
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      stageCount:
        type: int
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      stageNames:
        type: "List<String>"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }

  # -------------------------------------------------------------------
  # 5. Envelope
  # -------------------------------------------------------------------
  Envelope:
    type: abstract
    section: "5. Envelope"
    dart_name: XybridEnvelope
    kotlin_name: XybridEnvelope
    swift_name: XybridEnvelope
    csharp_name: Envelope
    factories:
      text:
        params:
          - { name: text, type: String }
          - { name: voiceId, type: "String?", default: "null" }
          - { name: speed, type: "double?", default: "null" }
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      audio:
        params:
          - { name: audioBytes, type: "List<int>" }
          - { name: sampleRate, type: int, default: "16000" }
          - { name: channels, type: int, default: "1" }
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      embedding:
        params: [{ name: embedding, type: "List<double>" }]
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: planned }
      textWithRole:
        params:
          - { name: text, type: String }
          - { name: role, type: MessageRole }
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      image:
        params:
          - { name: imageBytes, type: "List<int>" }
          - { name: format, type: String }
        status: { dart: planned, kotlin: planned, swift: planned, csharp: planned }
      userMessage:
        params:
          - { name: text, type: String }
          - { name: images, type: "List<XybridEnvelope>", default: "[]" }
        status: { dart: planned, kotlin: planned, swift: planned, csharp: planned }

  # -------------------------------------------------------------------
  # 6. VoiceInfo
  # -------------------------------------------------------------------
  VoiceInfo:
    type: data
    section: "6. VoiceInfo (TTS Voice Metadata)"
    properties:
      id:
        type: String
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
      name:
        type: String
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
      gender:
        type: "String?"
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
      language:
        type: "String?"
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
      style:
        type: "String?"
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
      isDefault:
        type: bool
        status: { dart: planned, kotlin: planned, swift: planned, csharp: planned }

  # -------------------------------------------------------------------
  # 7. Result Types
  # -------------------------------------------------------------------
  XybridResult:
    type: data
    section: "7. Result Types"
    dart_name: XybridResult
    kotlin_name: XybridResult
    swift_name: XybridResult
    csharp_name: InferenceResult
    properties:
      success:
        type: bool
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      error:
        type: "String?"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      text:
        type: "String?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      audioBytes:
        type: "Uint8List?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      embedding:
        type: "Float32List?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      outputType:
        type: OutputType
        status: { dart: planned, kotlin: planned, swift: planned, csharp: implemented }
      latencyMs:
        type: int
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      modelId:
        type: String
        status: { dart: planned, kotlin: planned, swift: planned, csharp: implemented }
      isFailure:
        type: bool
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      audioAsWav:
        type: "Uint8List?"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }

  # -------------------------------------------------------------------
  # 8. Supporting Types
  # -------------------------------------------------------------------
  ConversationContext:
    type: class
    section: "8. Supporting Types"
    status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }

  MessageRole:
    type: enum
    section: "8. Supporting Types"
    values: [system, user, assistant]
    status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }

  GenerationConfig:
    type: data
    section: "8. Supporting Types"
    status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
    properties:
      maxTokens:
        type: "int?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      temperature:
        type: "double?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      topP:
        type: "double?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      minP:
        type: "double?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      topK:
        type: "int?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      repetitionPenalty:
        type: "double?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      stopSequences:
        type: "List<String>?"
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
    factories:
      greedy:
        status: { dart: implemented, kotlin: implemented, swift: planned, csharp: implemented }
      creative:
        status: { dart: implemented, kotlin: implemented, swift: planned, csharp: implemented }

  StreamToken:
    type: data
    section: "8. Supporting Types"
    status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }

  # -------------------------------------------------------------------
  # 9. Configuration Types
  # -------------------------------------------------------------------
  TelemetryConfiguration:
    type: data
    section: "9. Configuration Types"
    status: { dart: stub, kotlin: planned, swift: planned, csharp: implemented }

  CsTelemetryConfig:
    type: builder
    section: "9. Configuration Types"
    csharp_path: "Xybrid.TelemetryConfig"
    status: { csharp: implemented }
    stability: { csharp: stable }
    not_applicable: [dart, kotlin, swift, rust]
    since: "0.1.0-beta11"
    notes: "Unity / C# SDK telemetry builder + lifecycle surface. Constructor takes only (apiKey) and binds to the SDK's default ingest URL (https://ingest.xybrid.dev); use WithEndpoint to target a self-hosted collector. The Endpoint property reports the currently resolved URL. Fluent setters mutate in place and return `this`. Lifecycle methods live on XybridClient (InitializeTelemetry consumes the config handle, FlushTelemetry / ShutdownTelemetry are idempotent)."
    methods:
      constructor:
        name: TelemetryConfig
        parameters:
          - { name: apiKey, type: string }
        returns: TelemetryConfig
        description: "Creates a new config bound to the SDK's default ingest endpoint. Throws ArgumentException if apiKey is null, empty, or whitespace."
        since: "0.1.0-beta12"
      Endpoint:
        name: Endpoint
        property: true
        returns: string
        description: "Currently resolved ingest endpoint. Returns the SDK default until WithEndpoint is called, then the override."
        since: "0.1.0-beta12"
      with_endpoint:
        name: WithEndpoint
        parameters:
          - { name: endpoint, type: string }
        returns: TelemetryConfig
        description: "Overrides the ingest endpoint. Use for self-hosted collectors. Throws ArgumentException on null/empty/whitespace."
        since: "0.1.0-beta12"
      with_app_version:
        name: WithAppVersion
        parameters:
          - { name: appVersion, type: string }
        returns: TelemetryConfig
        description: "Sets the application version reported with every telemetry event."
        since: "0.1.0-beta11"
      with_device_label:
        name: WithDeviceLabel
        parameters:
          - { name: deviceLabel, type: string }
        returns: TelemetryConfig
        description: "Sets a human-readable device label reported with every telemetry event."
        since: "0.1.0-beta11"
      with_device_attribute:
        name: WithDeviceAttribute
        parameters:
          - { name: key, type: string }
          - { name: value, type: string }
        returns: TelemetryConfig
        description: "Adds or replaces a custom device attribute under device.custom."
        since: "0.1.0-beta11"
      with_batch_size:
        name: WithBatchSize
        parameters:
          - { name: batchSize, type: uint }
        returns: TelemetryConfig
        description: "Sets the maximum number of events buffered before flushing."
        since: "0.1.0-beta11"
      with_flush_interval:
        name: WithFlushInterval
        parameters:
          - { name: interval, type: TimeSpan }
        returns: TelemetryConfig
        description: "Sets the background flush interval; fractional seconds are truncated."
        since: "0.1.0-beta11"
      InitializeTelemetry:
        name: InitializeTelemetry
        static: true
        parameters:
          - { name: config, type: TelemetryConfig }
        returns: void
        description: "Starts the telemetry sender. Consumes the config handle. Throws InvalidOperationException if XybridClient is not initialized or if telemetry is already initialized."
        since: "0.1.0-beta11"
      FlushTelemetry:
        name: FlushTelemetry
        static: true
        returns: void
        description: "Forces a synchronous flush of buffered telemetry events. No-op if telemetry was never initialized."
        since: "0.1.0-beta11"
      ShutdownTelemetry:
        name: ShutdownTelemetry
        static: true
        returns: void
        description: "Shuts down the telemetry sender. Idempotent and fire-and-forget; no-op if telemetry was never initialized or already shut down."
        since: "0.1.0-beta11"

  RustTelemetryConfig:
    type: builder
    section: "9. Configuration Types"
    rust_path: "xybrid_sdk::telemetry::TelemetryConfig"
    status: { rust: implemented }
    stability: { rust: stable }
    not_applicable: [dart, kotlin, swift, csharp]
    since: "0.1.0-beta10"
    notes: "Rust-only SDK telemetry builder surface. Non-Rust SDKs do not expose TelemetryConfig in this batch."
    methods:
      with_device_label:
        name: with_device_label
        parameters:
          - { name: label, type: "impl Into<String>" }
        returns: Self
        description: "Sets a human-friendly label displayed alongside the stable device identifier."
        since: "0.1.0-beta10"
      with_hardware:
        name: with_hardware
        parameters:
          - { name: profile, type: DeviceProfile }
        returns: Self
        description: "Supplies the complete hardware profile and disables automatic hardware detection."
        since: "0.1.0-beta10"
      with_hardware_chip:
        name: with_hardware_chip
        parameters:
          - { name: chip, type: "impl Into<String>" }
        returns: Self
        description: "Overrides the detected chip family."
        since: "0.1.0-beta10"
      with_hardware_ram_gb:
        name: with_hardware_ram_gb
        parameters:
          - { name: gb, type: u32 }
        returns: Self
        description: "Overrides the detected RAM size in GB."
        since: "0.1.0-beta10"
      with_hardware_os:
        name: with_hardware_os
        parameters:
          - { name: os, type: "impl Into<String>" }
          - { name: version, type: "impl Into<String>" }
        returns: Self
        description: "Overrides the detected OS name and OS version."
        since: "0.1.0-beta10"
      with_hardware_arch:
        name: with_hardware_arch
        parameters:
          - { name: arch, type: "impl Into<String>" }
        returns: Self
        description: "Overrides the detected CPU architecture."
        since: "0.1.0-beta10"
      with_device_attribute:
        name: with_device_attribute
        parameters:
          - { name: key, type: "impl Into<String>" }
          - { name: value, type: "impl Into<String>" }
        returns: Self
        description: "Adds an app-provided string attribute under device.custom."
        since: "0.1.0-beta10"
      with_auto_hardware_detection:
        name: with_auto_hardware_detection
        parameters:
          - { name: enabled, type: bool }
        returns: Self
        description: "Enables or disables automatic hardware detection; default is true. When disabled and no explicit overrides are supplied, the SDK omits the `device` object and skips auto-generation of `device_id` on emitted events."
        since: "0.1.0-beta10"
      with_hostname_capture:
        name: with_hostname_capture
        parameters:
          - { name: enabled, type: bool }
        returns: Self
        description: "Enables or disables hostname capture; default is false."
        since: "0.1.0-beta10"
      with_resource_telemetry:
        name: with_resource_telemetry
        parameters:
          - { name: mode, type: "ResourceTelemetryMode" }
        returns: Self
        description: >-
          Enables per-inference resource telemetry (CPU avg/peak, process
          RSS peak, min available memory, memory-pressure peak, thermal peak,
          battery end, sample count). When the mode is not `Off`,
          `init_platform_telemetry` pre-warms a process-wide
          `ResourceMonitor` and every subsequent `XybridModel::run*` /
          `Pipeline::run*` call attaches a `resource_summary` object to its
          `ModelComplete` / `PipelineComplete` telemetry event. The env var
          `XYBRID_RESOURCE_TELEMETRY=off|boundary|summary|debug_local` wins
          over this config value. Full contract at
          `docs/sdk/resource-telemetry.md`. Default is `Off`.
        since: "0.1.0-beta12"

  XybridConfiguration:
    type: data
    section: "9. Configuration Types"
    status: { dart: planned, kotlin: planned, swift: planned, csharp: planned }

  SdkConfig:
    type: data
    section: "9. Configuration Types"
    rust_path: "xybrid_sdk::SdkConfig"
    status: { rust: implemented }
    stability: { rust: stable }
    not_applicable: [dart, kotlin, swift, csharp]
    since: "0.1.0-beta12"
    notes: >-
      Rust-side init configuration consumed by `init_sdk_cache_dir`. Non-Rust
      bindings register the binding identifier via the platform-specific entry
      points listed in `docs/telemetry/registry.md` (Flutter:
      `XybridSdkClient`, Kotlin: `Xybrid.init`, Swift: `Xybrid.initialize`,
      Unity: `XybridClient.Initialize`); they do not expose `SdkConfig`
      directly. The `binding` field flows into the `X-Xybrid-Client` registry
      header — see `docs/telemetry/registry.md` for the wire format.
    properties:
      cache_dir:
        type: "Option<PathBuf>"
        description: "Custom cache directory. Required on Android, optional elsewhere."
        since: "0.1.0-beta10"
      binding:
        type: "Option<&'static str>"
        description: >-
          Binding identifier reported in the `X-Xybrid-Client` registry
          telemetry header. Defaults to `xybrid_sdk::DEFAULT_BINDING`
          ("rust") when unset. Each platform binding (Flutter, Kotlin,
          Swift, Unity) sets its own value at SDK init.
        since: "0.1.0-beta12"
    methods:
      with_binding:
        name: with_binding
        parameters:
          - { name: binding, type: "&'static str" }
        returns: Self
        description: "Override the binding identifier reported in the registry telemetry header. Fluent builder."
        since: "0.1.0-beta12"
      binding:
        name: binding
        returns: "&'static str"
        description: "Resolve the configured binding identifier, falling back to `DEFAULT_BINDING` when unset."
        since: "0.1.0-beta12"
  RunOptions:
    type: data
    section: "8. Supporting Types"
    methods:
      with_generation_config:
        params: [{ name: config, type: GenerationConfig }]
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      with_abort_policy:
        params: [{ name: policy, type: AbortPolicy }]
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      with_cancellation_token:
        params: [{ name: token, type: CancellationToken }]
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      with_correlation_id:
        params: [{ name: correlationId, type: String }]
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }

  AbortPolicy:
    type: data
    section: "8. Supporting Types"
    properties:
      stop_on:
        type: "List<AbortSignal>"
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      fallback_to_cloud:
        type: bool
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      max_grace_tokens:
        type: int
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }

  CancellationToken:
    type: class
    section: "8. Supporting Types"
    methods:
      cancel:
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      is_cancelled:
        return: bool
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
