  PixelFormat:
    type: enum
    section: "8. Supporting Types"
    notes: "Raw pixel-buffer formats accepted by Envelope.imageRaw. Serialized lowercase. Unsupported raw formats (p010, 10-bit YUV, premultiplied alpha, opaque handles) surface as UnsupportedPixelFormat before any pixel bytes are read."
    values: [rgb8, rgba8, bgra8, nv12, nv21, i420]
    status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }

  ImagePlane:
    type: data
    section: "8. Supporting Types"
    notes: "One memory plane inside a raw pixel image. Packed RGB-family inputs carry a single plane; NV12/NV21 carry two; I420 carries three. Plane validation enforces row stride, pixel stride, and extents."
    properties:
      offset:
        type: int
        notes: "Byte offset into the raw pixel buffer where this plane begins."
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      rowStride:
        type: int
        notes: "Bytes between adjacent rows in this plane (Rust: row_stride)."
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      pixelStride:
        type: int
        notes: "Bytes between adjacent samples in the same row (Rust: pixel_stride)."
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      width:
        type: int
        notes: "Plane width in samples. Chroma planes are usually subsampled."
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      height:
