    methods:
      voice:
        params: [{ name: voiceId, type: String }]
        return: "VoiceInfo?"
        status: { dart: planned, kotlin: implemented, swift: implemented, csharp: implemented }
      run:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: config, type: "GenerationConfig?", default: "null" }
        return: XybridResult
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      runWithOptions:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: options, type: RunOptions }
        return: XybridResult
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      runWithContext:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: context, type: ConversationContext }
          - { name: config, type: "GenerationConfig?", default: "null" }
        return: XybridResult
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      runWithContextOptions:
        async: true
        params:
          - { name: envelope, type: Envelope }
          - { name: context, type: ConversationContext }
          - { name: options, type: RunOptions }
        return: XybridResult
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      runStreaming:
        params:
          - { name: envelope, type: Envelope }
          - { name: config, type: "GenerationConfig?" }
        return: "Stream<StreamToken>"
        notes: "Dart accepts two extra optional named params beyond the contract shape: cancellationToken (issue 10) and preempt (issue 11). preempt defaults to false (drop-if-busy / serialized — the existing behavior). When preempt=true AND a cancellationToken is supplied, the run cancels the model's previously in-flight streaming run before acquiring the model write lock (latest-frame-wins), so a continuous live-capture loop can flip from drop-if-busy to cancel-and-replace without head-of-line blocking. preempt with no token is a no-op. Threaded Dart→FFI→SDK (run_streaming_with_options_preempt); the cancel-and-replace slot is a separate mutex on the model, never held across the handle write lock."
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      runStreamingWithOptions:
        params:
          - { name: envelope, type: Envelope }
          - { name: options, type: RunOptions }
        return: "Stream<StreamToken>"
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      runTtsStreaming:
        params:
          - { name: envelope, type: Envelope }
          - { name: options, type: RunOptions }
        return: "Stream<TtsStreamEvent>"
        notes: "Streaming TTS (issue: realtime-vision C). Synthesizes the text sentence-chunk by sentence-chunk and emits each chunk's raw 16-bit LE PCM with its sample rate (FfiTtsStreamEvent::AudioChunk { pcm, sample_rate }) as it is produced, instead of one batched WAV — so playback can start after the first sentence. The consumer wraps each chunk into a WAV (the one-shot path's audioAsWav owns the header today). Cancellation mirrors runStreaming's sink-close-as-cancel: unsubscribing the Dart stream (barge-in) closes the FFI sink and stops synthesis at the next chunk boundary (one chunk's ONNX forward is uninterruptible). The batch crossfade is dropped; a short per-chunk edge fade masks the high-pass startup transient and the gapless-splice seam. Reuses the cached TTS ONNX session so chunk N+1 starts immediately."
        status: { rust: implemented, dart: implemented, kotlin: na, swift: na, csharp: na }
      runStreamingWithFallback:
        params:
          - { name: envelope, type: Envelope }
          - { name: options, type: RunOptions }
          - { name: config, type: "GenerationConfig?", default: "null" }
        return: "Stream<StreamToken>"
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      runStreamingWithContext:
        params:
          - { name: envelope, type: Envelope }
          - { name: context, type: ConversationContext }
          - { name: config, type: "GenerationConfig?" }
        return: "Stream<StreamToken>"
        notes: "Dart accepts the same two extra optional named params as runStreaming: cancellationToken (issue 10) and preempt (issue 11, default false). preempt=true + a cancellationToken makes this run cancel the model's previously in-flight streaming run before taking the write lock (latest-frame-wins). See runStreaming notes for the full cancel-and-replace contract."
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      runStreamingWithContextOptions:
        params:
          - { name: envelope, type: Envelope }
          - { name: context, type: ConversationContext }
          - { name: options, type: RunOptions }
        return: "Stream<StreamToken>"
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      benchmark:
        async: true
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      unload:
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      executionProviderInfo:
        return: ExecutionProviderInfo
        status: { dart: planned, kotlin: planned, swift: planned, csharp: planned }

