# API Surface Contract
# Machine-readable companion to API_REFERENCE.md
#
# This file is parsed by tools/scripts/api-contract-check.sh and the /sync-api command.
# Status values: implemented, partial, stub, planned
#
# IMPORTANT: When modifying SDK public APIs, update BOTH this file and API_REFERENCE.md.

version: "0.1.0"

classes:

  # -------------------------------------------------------------------
  # 1. Xybrid (Entry Point)
  # -------------------------------------------------------------------
  Xybrid:
    type: singleton
    section: "1. Xybrid (Entry Point)"
    methods:
      init:
        async: true
        params:
          - { name: apiKey, type: "String?" }
          - { name: gatewayUrl, type: "String?" }
          - { name: ingestUrl, type: "String?" }
          - { name: resourceTelemetry, type: "String?" }
        # apiKey-bundled init shipped across all four bindings: Dart
        # Xybrid.init, Kotlin Xybrid.init(context, …), Swift
        # Xybrid.initialize(apiKey:), Unity XybridClient.Initialize(apiKey:).
        # Param coverage varies by binding (e.g. Unity omits gatewayUrl;
        # resourceTelemetry is Dart/Rust only) — the apiKey path is universal.
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
      setApiKey:
        params: [{ name: apiKey, type: String }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      setGatewayUrl:
        params: [{ name: gatewayUrl, type: String }]
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      model:
        params:
          - { name: modelId, type: "String?" }
          - { name: platform, type: "String?" }
          - { name: bundlePath, type: "String?" }
          - { name: modelDir, type: "String?" }
        return: XybridModelLoader
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: implemented }
      pipeline:
        params:
          - { name: yaml, type: "String?" }
          - { name: filePath, type: "String?" }
        return: XybridPipelineRef
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      isModelCached:
        params: [{ name: modelId, type: String }]
        return: bool
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }

