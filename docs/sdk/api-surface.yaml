  AbortSignal:
    type: enum
    section: "8. Supporting Types"
    variants:
      UserCancelled:
        notes: "User-initiated cancellation. Reachable from Dart (issue 10) via the CancellationToken handle passed to the streaming run methods: cancelling the token makes the run's AbortPolicy observe UserCancelled and halts generation at the next token boundary. The Dart AbortSignal enum itself does not expose a userCancelled value — cancellation is driven by the token, not by adding the signal to a Dart policy. Local streaming abort is cooperative and checked per-token before each emitted token."
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      MemoryPressureWarn:
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      MemoryPressureCritical:
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      ThermalHot:
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      ThermalCritical:
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }

  CancellationToken:
    type: class
    section: "8. Supporting Types"
    notes: "Cooperative cancel handle for an in-flight run. In Rust it is paired with a RunOptions via with_cancellation_token; in Dart the caller constructs a CancellationToken and passes it to the streaming run methods (runStreaming / runStreamingWithContext / runStreamingWithFallback) via the optional cancellationToken parameter. Local streaming abort is cooperative: the token's cancelled state is checked before every emitted token, so cancellation takes effect at the next token boundary, not mid-token, and the model write lock is released promptly. The Dart binding surface (cancel handle exposing cancel() / isCancelled, plus sink-close-as-cancel when the Dart stream is unsubscribed mid-run) was wired by issue 10. Issue 11 reuses the same token for preemptive cancel-and-replace: when runStreaming/runStreamingWithContext are called with preempt=true, the token is registered in the model's in-flight slot and a later preempting run cancels it (latest-frame-wins) before acquiring the write lock — so a stale run halts and releases the lock instead of blocking the new one."
    methods:
      cancel:
        notes: "Request cooperative cancellation of the associated run. Takes effect at the next token boundary."
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      is_cancelled:
        notes: "Whether cancellation has been requested (Dart: isCancelled getter)."
        return: bool
        status: { rust: implemented, dart: implemented, kotlin: planned, swift: planned, csharp: planned }
