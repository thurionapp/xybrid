  RunOptions:
    type: data
    section: "8. Supporting Types"
    properties:
      abortPolicy:
        type: AbortPolicy
        status: { dart: implemented, rust: planned, kotlin: planned, swift: planned, csharp: planned }
      cloudProvider:
        type: "String?"
        status: { dart: implemented, rust: planned, kotlin: planned, swift: planned, csharp: planned }
      cloudModel:
        type: "String?"
        status: { dart: implemented, rust: planned, kotlin: planned, swift: planned, csharp: planned }
      cloudGatewayUrl:
        type: "String?"
        notes: "Optional Xybrid cloud gateway base URL. Customer builds accept HTTPS Xybrid hosts with a /v1 base path; debug builds also accept local/private gateways for local platform stacks."
        status: { dart: implemented, rust: planned, kotlin: planned, swift: planned, csharp: planned }
      correlationId:
        type: "String?"
        status: { dart: implemented, rust: planned, kotlin: planned, swift: planned, csharp: planned }
      maxGraceTokens:
        type: "int?"
        status: { dart: implemented, rust: planned, kotlin: planned, swift: planned, csharp: planned }
      # Live-mode / frame-session concept (realtime vision Phase B, issue 14).
      # Surfaced on the streaming run-options path for continuous live-capture
      # loops (e.g. the Flutter vision-live loop). The caller generates the id;
      # the SDK treats it as an opaque tag. Telemetry note below.
      frameSessionId:
        type: "String?"
        notes: "Caller-supplied UUID identifying one continuous live-capture session. Generated by the caller (the Flutter live loop), opaque to the SDK. Tags every inference in the session so telemetry can roll up per session instead of per frame. Null for one-shot runs. Rust: RunOptions.frame_session_id field. Dart: surfaced as the optional frameSessionId parameter on the streaming run methods (FfiRunOptions.frame_session_id under the hood); there is no standalone Dart RunOptions builder yet (issue 14)."
        status: { dart: implemented, rust: implemented, kotlin: planned, swift: planned, csharp: planned }
      liveMode:
        type: bool
        notes: "When true, marks the run as part of a continuous live-capture session. Live-mode inferences carry frame_session_id + live_mode on the wire and are rate-limited (~1 wire row/sec per frame_session_id) at the telemetry dispatch funnel rather than emitted per frame. Defaults to false (per-run telemetry, byte-for-byte unchanged). Set implicitly via with_frame_session / the frameSessionId streaming parameter — callers don't toggle it directly (issue 14)."
        status: { dart: implemented, rust: implemented, kotlin: planned, swift: planned, csharp: planned }
    methods:
      with_generation_config:
        params: [{ name: config, type: GenerationConfig }]
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      with_abort_policy:
        params: [{ name: policy, type: AbortPolicy }]
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      with_cancellation_token:
        params: [{ name: token, type: CancellationToken }]
        notes: "Rust builder that attaches a CancellationToken to the run options and makes the AbortPolicy observe UserCancelled. The Dart binding does not expose a with_cancellation_token builder; instead the streaming run methods take an optional cancellationToken parameter that wires the token + UserCancelled observation under the hood (issue 10). dart stays planned for this exact builder shape — the capability is reachable via the streaming parameter."
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      with_correlation_id:
        params: [{ name: correlationId, type: String }]
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }
      with_frame_session:
        notes: "Tag this run as part of a live-capture session: sets frameSessionId (caller-supplied UUID) and liveMode=true. Streaming run-options path only; the SDK rate-limits the session's telemetry to ~1 wire row/sec per frame_session_id (issue 14). Rust: RunOptions::with_frame_session builder. Dart does NOT expose this exact builder — the capability is reachable via the frameSessionId parameter on the streaming run methods, which wires FfiRunOptions.frame_session_id -> with_frame_session under the hood (same pattern as with_cancellation_token), so dart stays planned for the builder shape itself."
        params:
          - { name: frameSessionId, type: String }
        status: { rust: implemented, dart: planned, kotlin: planned, swift: planned, csharp: planned }

