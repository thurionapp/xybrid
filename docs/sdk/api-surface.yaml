          - { name: format, type: String }
        notes: "Supports png, jpeg, and webp. Shared constructor enforces 10 MiB encoded-byte and 16,777,216 decoded-pixel defaults, rejects animated WebP for v1, records width/height metadata, and redacts image bytes from human-readable serialization."
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }
