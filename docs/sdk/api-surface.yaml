        notes: "Binding surface for camera/canvas frames without JPEG re-encoding. PixelFormat covers rgb8, rgba8, bgra8, nv12, nv21, and i420. Unsupported raw formats such as p010, 10-bit YUV, premultiplied alpha, or opaque handles surface as UnsupportedPixelFormat. Plane validation enforces row stride, pixel stride, extents, and YUV color metadata; diagnostics redact pixel bytes. Dart binding wires through FRB to Envelope::image_raw."
        status: { dart: implemented, kotlin: planned, swift: planned, csharp: planned }
      userMessage:
        params:
          - { name: text, type: String }
          - { name: images, type: "List<ImageEnvelope>", default: "[]" }
        notes: "Accepts image envelopes from image() or imageRaw(); rejects text/audio/embedding and nested multipart envelopes."
        status: { dart: implemented, kotlin: implemented, swift: implemented, csharp: implemented }

