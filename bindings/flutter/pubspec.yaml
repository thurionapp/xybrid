name: xybrid_flutter
description: "Xybrid Flutter SDK — run ML models on-device or in the cloud with intelligent hybrid routing and streaming inference."
version: 0.2.0
homepage: https://github.com/xybrid-ai/xybrid
repository: https://github.com/xybrid-ai/xybrid
issue_tracker: https://github.com/xybrid-ai/xybrid/issues
topics:
  - machine-learning
  - ai
  - inference
  - edge-computing

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  # Must match the Rust `flutter_rust_bridge = "=2.11.1"` crate and the
  # codegen version, or the generated bindings throw a codegen/runtime
  # version-mismatch at startup. `^2.11.1` floats up to 2.12.x and breaks
  # consumers, but `pub publish` rejects an exact single-version pin. A
  # bounded `>=2.11.1 <2.12.0` range threads both: it stays inside the
  # 2.11.x line (currently only 2.11.1 exists, so it resolves there) while
  # satisfying pub.dev's "allow more than one version" rule. Bump the lower
  # bound (and the Rust pin) in lockstep if a compatible 2.11.x patch ships.
  flutter_rust_bridge: ">=2.11.1 <2.12.0"
  plugin_platform_interface: ^2.0.2
  freezed_annotation: ^2.0.0
  path_provider: ^2.1.5
  # Cross-platform battery level observer used by Xybrid.init on
  # iOS / Android to forward host battery state into the routing
  # engine via the FRB push-state surface (XybridDevice.setBatteryLevel).
  # Flutter on macOS / Linux / Windows uses xybrid-core's in-process
  # pollers and does not rely on this package at runtime.
  battery_plus: ^6.0.0

dev_dependencies:
  ffi: ^2.1.3
  ffigen: ^13.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  freezed: ^2.0.0
  build_runner: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
